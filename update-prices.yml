name: Update Portfolio Prices

on:
  schedule:
    # Every weekday at 7:00 AM SGT (11:00 PM UTC previous day)
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bake latest prices
        run: node build.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update prices $(date -u +%Y-%m-%d)"
          git push
