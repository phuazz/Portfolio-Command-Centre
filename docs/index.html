<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Single-page portfolio dashboard with trend signals, crisis overlay, and systematic risk management.">
<meta name="theme-color" content="#1a1a18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta property="og:title" content="Portfolio Command Centre">
<meta property="og:description" content="Multi-asset portfolio dashboard with 3-factor vote signals, crisis overlay, and strategy backtesting.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<title>Portfolio Command Centre — Illustrative</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — Editorial White / Refined
   ═══════════════════════════════════════════ */
:root {
  --bg: #fafaf8;
  --bg2: #ffffff;
  --bg3: #f5f5f0;
  --bg4: #eeeee8;
  --bg-hover: #f0f0ea;
  --bd: #e2e0d8;
  --bd2: #d5d3ca;
  --bd-strong: #c0beb5;
  --t1: #1a1a18;
  --t2: #5c5c56;
  --t3: #8a8a82;
  --t4: #b0b0a8;
  --g: #1a8754;
  --g2: #22a366;
  --g-bg: rgba(26,135,84,0.07);
  --g-bg2: rgba(26,135,84,0.14);
  --r: #c0392b;
  --r2: #e74c3c;
  --r-bg: rgba(192,57,43,0.07);
  --r-bg2: rgba(192,57,43,0.14);
  --b: #2563eb;
  --b2: #3b82f6;
  --b-bg: rgba(37,99,235,0.06);
  --b-bg2: rgba(37,99,235,0.12);
  --a: #b45309;
  --a-bg: rgba(180,83,9,0.07);
  --p: #7c3aed;
  --p-bg: rgba(124,58,237,0.06);
  --c: #0891b2;
  --c-bg: rgba(8,145,178,0.06);
  --pk: #be185d;
  --pk-bg: rgba(190,24,93,0.06);

  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', 'SF Mono', monospace;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.06), 0 4px 6px rgba(0,0,0,0.04);
  --radius: 8px;
  --radius-lg: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:15px; -webkit-font-smoothing:antialiased; -webkit-text-size-adjust:100%; }
body { background:var(--bg); color:var(--t1); font-family:var(--sans); line-height:1.5; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--bd-strong); }

/* ─── LAYOUT ──────────────────────────── */
.shell { max-width:1520px; margin:0 auto; padding:20px 32px 60px; }

/* ─── MASTHEAD ────────────────────────── */
.masthead { padding:28px 0 22px; border-bottom:2px solid var(--t1); margin-bottom:24px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px; }
.masthead-left h1 { font-family:var(--serif); font-size:32px; font-weight:400; letter-spacing:-0.5px; line-height:1.1; }
.masthead-left h1 em { font-style:italic; color:var(--t3); }
.masthead-sub { font-size:13px; color:var(--t3); margin-top:6px; letter-spacing:0.3px; }
.masthead-right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.pill { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; letter-spacing:0.2px; }
.pill-acct { background:var(--t1); color:var(--bg2); }
.pill-date { background:var(--bg3); color:var(--t2); border:1px solid var(--bd); }
.pill-live { background:var(--g-bg); color:var(--g); border:1px solid rgba(26,135,84,0.2); }
.pill-loading { background:var(--a-bg); color:var(--a); border:1px solid rgba(180,83,9,0.2); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ─── KPI STRIP ───────────────────────── */
.kpi-strip { display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--bd); border:1px solid var(--bd); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:28px; }
.kpi { background:var(--bg2); padding:18px 20px; position:relative; }
.kpi:first-child { border-radius:var(--radius-lg) 0 0 var(--radius-lg); }
.kpi:last-child { border-radius:0 var(--radius-lg) var(--radius-lg) 0; }
.kpi-label { font-size:11px; color:var(--t3); text-transform:uppercase; letter-spacing:1px; font-weight:600; margin-bottom:6px; }
.kpi-val { font-size:24px; font-weight:700; letter-spacing:-0.5px; font-family:var(--sans); }
.kpi-sub { font-size:12px; color:var(--t3); margin-top:3px; font-weight:400; }
.kpi-val.pos { color:var(--g); }
.kpi-val.neg { color:var(--r); }
.kpi-change { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:700; margin-top:5px; }
.kpi-change.up { background:var(--g-bg); color:var(--g); }
.kpi-change.dn { background:var(--r-bg); color:var(--r); }

/* ─── TABS ────────────────────────────── */
.tab-bar { display:flex; gap:0; border-bottom:1px solid var(--bd); margin-bottom:24px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.tab-bar::-webkit-scrollbar { display:none; }
.tab { padding:12px 22px; font-size:14px; font-weight:600; color:var(--t3); cursor:pointer; border:none; background:none; position:relative; transition:color 0.15s; letter-spacing:0.3px; white-space:nowrap; min-height:44px; }
.tab:hover { color:var(--t1); }
.tab.active { color:var(--t1); }
.tab.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--t1); }

/* ─── CARDS ───────────────────────────── */
.card { background:var(--bg2); border:1px solid var(--bd); border-radius:var(--radius-lg); box-shadow:var(--shadow); overflow:hidden; }
.card-head { padding:14px 18px; border-bottom:1px solid var(--bd); display:flex; justify-content:space-between; align-items:center; }
.card-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--t2); display:flex; align-items:center; gap:8px; }
.card-title .indicator { width:8px; height:8px; border-radius:50%; }
.card-body { padding:16px 18px; }

/* ─── GRIDS ───────────────────────────── */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.g-main { display:grid; grid-template-columns:2.4fr 1fr; gap:16px; }
.mb { margin-bottom:24px; }

/* ─── TABLE ───────────────────────────── */
.tbl { width:100%; border-collapse:collapse; font-size:13px; }
.tbl thead th { padding:10px 12px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--t3); font-weight:700; border-bottom:2px solid var(--bd); background:var(--bg3); position:sticky; top:0; z-index:3; }
.tbl tbody tr { border-bottom:1px solid var(--bd); transition:background 0.1s; }
.tbl tbody tr:hover { background:var(--bg-hover); }
.tbl tbody td { padding:10px 12px; vertical-align:middle; }
.tbl .r { text-align:right; }
.tbl .c { text-align:center; }

/* ─── TAGS ────────────────────────────── */
.tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; letter-spacing:0.4px; }
.tag-hk { background:#fef2f2; color:#b91c1c; }
.tag-jp { background:#fdf2f8; color:#be185d; }
.tag-us { background:#eff6ff; color:#1d4ed8; }
.tag-gb { background:#f5f3ff; color:#6d28d9; }
.tag-sg { background:#ecfdf5; color:#047857; }

/* ─── P&L ─────────────────────────────── */
.pl { font-weight:600; }
.pl.pos { color:var(--g); }
.pl.neg { color:var(--r); }

/* ─── BARS ────────────────────────────── */
.bar-track { height:5px; border-radius:3px; background:var(--bg4); overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }

/* ─── ALLOCATION ──────────────────────── */
.alloc-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--bd); }
.alloc-row:last-child { border-bottom:none; }
.alloc-label { width:120px; font-size:12px; font-weight:600; color:var(--t2); }
.alloc-bar { flex:1; height:24px; border-radius:5px; background:var(--bg4); overflow:hidden; }
.alloc-fill { height:100%; border-radius:5px; transition:width 0.6s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; font-size:11px; font-weight:700; }
.alloc-val { width:80px; text-align:right; font-size:13px; font-weight:600; }

/* ─── SORT HEADERS ────────────────────── */
.sort-th { cursor:pointer; user-select:none; }
.sort-th:hover { color:var(--b); }

/* ─── FILTERS ─────────────────────────── */
.filters { display:flex; gap:6px; flex-wrap:wrap; }
.fbtn { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--bd); background:var(--bg2); color:var(--t3); transition:all 0.15s; min-height:36px; }
.fbtn.active { background:var(--t1); color:var(--bg2); border-color:var(--t1); }
.fbtn:hover:not(.active) { border-color:var(--t2); color:var(--t2); }

/* ─── TREND SIGNALS ───────────────────── */
.signal { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:4px; font-size:11px; font-weight:700; }
.signal-bull { background:var(--g-bg2); color:var(--g); }
.signal-bear { background:var(--r-bg2); color:var(--r); }
.signal-neutral { background:var(--bg4); color:var(--t3); }
.signal-strong { background:var(--g); color:#fff; }

/* ─── HEATMAP ─────────────────────────── */
.hm { border-radius:6px; padding:10px 8px; text-align:center; transition:transform 0.15s; }
.hm:hover { transform:scale(1.03); }

/* ─── SUMMARY ROW ─────────────────────── */
.tbl tr.sum { background:var(--bg3); font-weight:700; border-top:2px solid var(--bd2); }
.tbl tr.sum td { padding:12px; }

/* ─── EXCHANGE HEADER ROW ─────────────── */
.tbl tr.exch-row td { background:var(--bg3); font-weight:700; font-size:12px; letter-spacing:0.5px; padding:7px 12px !important; }

/* ─── LOADING ─────────────────────────── */
.loading-overlay { position:fixed; inset:0; background:rgba(250,250,248,0.85); display:flex; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(2px); }
.loading-box { text-align:center; }
.loading-spinner { width:40px; height:40px; border:3px solid var(--bd); border-top-color:var(--t1); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg) } }
.loading-text { font-size:14px; color:var(--t2); }
.loading-sub { font-size:12px; color:var(--t4); margin-top:4px; }

/* ─── EXPANDABLE CHART PANEL ──────────── */
.chart-row td { padding:0 !important; border-bottom:2px solid var(--bd2); }
.chart-panel { background:var(--bg3); padding:16px 20px; border-top:1px solid var(--bd); }
.chart-panel-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.chart-panel-title { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
.chart-panel-close { cursor:pointer; font-size:16px; color:var(--t3); padding:2px 6px; border-radius:4px; }
.chart-panel-close:hover { background:var(--bd); color:var(--t1); }
.chart-panel-legend { display:flex; gap:14px; font-size:11px; color:var(--t3); margin-top:6px; flex-wrap:wrap; }
.chart-panel-legend span { display:flex; align-items:center; gap:3px; }
.leg-dot { width:8px; height:3px; border-radius:2px; display:inline-block; }
.tbl tbody tr.clickable { cursor:pointer; }
.tbl tbody tr.clickable:hover { background:var(--bg-hover); }
.tbl tbody tr.row-selected { background:var(--b-bg) !important; }

/* ─── RESPONSIVE — TABLET ─────────────── */
@media(max-width:1200px) {
  .kpi-strip { grid-template-columns:repeat(3,1fr); }
  .g-main,.g2,.g3 { grid-template-columns:1fr; }
}

/* ─── RESPONSIVE — MOBILE ─────────────── */
@media(max-width:768px) {
  html { font-size:14px; }
  .shell { padding:12px 14px 40px; }
  .masthead { flex-direction:column; align-items:flex-start; gap:10px; padding:20px 0 16px; }
  .masthead-left h1 { font-size:24px; }
  .masthead-sub { font-size:12px; }
  .masthead-right { width:100%; justify-content:flex-start; }
  .kpi-strip { grid-template-columns:repeat(2,1fr); }
  .kpi { padding:14px 12px; }
  .kpi-val { font-size:20px; }
  .kpi-label { font-size:10px; }
  .kpi-sub { font-size:11px; }
  .tab { padding:10px 14px; font-size:13px; }
  .card-body { padding:12px 14px; }
  .card-head { padding:12px 14px; }
  .card-title { font-size:12px; }
  .tbl { font-size:12px; }
  .tbl thead th { font-size:10px; padding:8px 8px; }
  .tbl tbody td { padding:8px 8px; }
  .alloc-label { width:90px; font-size:11px; }
  .alloc-val { width:70px; font-size:12px; }
  .filters { gap:4px; }
  .fbtn { padding:5px 10px; font-size:11px; min-height:32px; }
  .g2,.g3,.g-main { gap:12px; }
  .mb { margin-bottom:16px; }
  /* Table horizontal scroll on mobile */
  .tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
}

/* ─── RESPONSIVE — SMALL PHONE ────────── */
@media(max-width:480px) {
  .shell { padding:10px 10px 36px; }
  .kpi-strip { grid-template-columns:1fr 1fr; }
  .kpi-val { font-size:18px; }
  .tab { padding:10px 10px; font-size:12px; }
  .masthead-left h1 { font-size:20px; }
}

/* ─── iOS SAFE AREAS ──────────────────── */
@supports(padding: max(0px)) {
  .shell { padding-left:max(14px, env(safe-area-inset-left)); padding-right:max(14px, env(safe-area-inset-right)); padding-bottom:max(40px, env(safe-area-inset-bottom)); }
}

/* ─── TOUCH TARGETS ───────────────────── */
@media(pointer:coarse) {
  .tab { min-height:48px; padding:14px 18px; }
  .fbtn { min-height:40px; }
  .tbl tbody td { padding:12px 10px; }
  .sort-th { min-height:44px; }
}

/* ─── ANIMATIONS ──────────────────────── */
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.fu { animation:fadeUp 0.4s ease forwards; }
.fu1 { animation-delay:0.05s; opacity:0; }
.fu2 { animation-delay:0.1s; opacity:0; }
.fu3 { animation-delay:0.15s; opacity:0; }

/* ─── CHART PLOTLY OVERRIDES ──────────── */
.js-plotly-plot .plotly .modebar { right:8px !important; top:4px !important; }

/* ─── TREND SCORE BAR ─────────────────── */


/* ─── AVAILABLE LTV BADGE ─────────────── */
.ltv-avail { font-size:11px; font-weight:600; padding:2px 6px; border-radius:3px; }
.ltv-high { background:#fef9c3; color:#854d0e; }
.ltv-med { background:#e0f2fe; color:#075985; }
.ltv-none { color:var(--t4); }
</style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div class="loading-text">Portfolio Command Centre</div>
    <div class="loading-sub">Rendering snapshot data...</div>
  </div>
</div>

<div class="shell">
  <div class="masthead fu">
    <div class="masthead-left">
      <h1>Portfolio Command Centre <em>— Illustrative</em></h1>
      <div class="masthead-sub">Illustrative multi-asset portfolio &nbsp;·&nbsp; All figures in SGD unless stated</div>
    </div>
    <div class="masthead-right">
      <span class="pill pill-date" id="dateDisp"></span>
      <span class="pill pill-acct">Brokerage + CDP</span>
      <span class="pill pill-loading" id="statusPill">◌ LOADING</span>
      <span class="pill pill-date" style="cursor:pointer;font-size:9px;opacity:0.7" onclick="localStorage.removeItem('pcc_cache_v5');location.reload()" title="Clear cache and re-fetch all max history">↻ Full Refresh</span>
    </div>
  </div>

  <!-- Inline progress bar — visible during background fetch -->
  <div id="fetchProgress" style="display:none;margin-bottom:16px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)">
    <div style="padding:12px 18px;display:flex;align-items:center;gap:14px">
      <div class="loading-spinner" style="width:18px;height:18px;border-width:2px;margin:0;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;font-weight:600;color:var(--t1)" id="fetchLabel">Fetching live prices...</span>
          <span style="font-size:11px;font-weight:600;color:var(--b);font-family:var(--mono)" id="fetchCount">0 / 0</span>
        </div>
        <div style="height:6px;border-radius:3px;background:var(--bg4);overflow:hidden">
          <div id="fetchBar" style="height:100%;border-radius:3px;background:var(--b);transition:width 0.3s ease;width:0%"></div>
        </div>
        <div style="font-size:10px;color:var(--t3);margin-top:4px" id="fetchDetail">Preparing fetch queue...</div>
      </div>
    </div>
  </div>

  <div class="kpi-strip fu fu1" id="kpiStrip"></div>
  <div id="crisisKPI" style="margin-top:-8px;margin-bottom:12px"></div>

  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="positions">Positions</button>
    <button class="tab" data-tab="signals">Trend Signals</button>
    <button class="tab" data-tab="allocation">Allocation</button>
    <button class="tab" data-tab="performance">Performance</button>
    <button class="tab" data-tab="risk">Risk Analysis</button>
  </div>

  <div id="tabContent">
    <div id="pane-positions" class="tab-pane"></div>
    <div id="pane-signals" class="tab-pane" style="display:none"></div>
    <div id="pane-allocation" class="tab-pane" style="display:none"></div>
    <div id="pane-performance" class="tab-pane" style="display:none"></div>
    <div id="pane-risk" class="tab-pane" style="display:none"></div>
  </div>
</div>

<script>
// ═══ SIGNAL HELPERS (vote-based) ═══
const sigCls = sig => sig==='STRONG BUY'?'signal-strong':sig==='BUY'?'signal-bull':sig==='HOLD'?'signal-neutral':'signal-bear';

const voteCol = v => v>=3?'var(--g)':v>=2?'#22a366':v>=1?'#b45309':'var(--r)';
const voteLabel = v => v>=3?'3/3':v>=2?'2/3':v>=1?'1/3':'0/3';

// ═══════════════════════════════════════════════════════════════
//  STATIC PORTFOLIO DATA — Parsed from SC statement (18 Apr 2026)
// ═══════════════════════════════════════════════════════════════

  { ticker:'2338.HK', yf:'2338.HK', name:'Weichai Power H', exchange:'HKG', ccy:'HKD', avgPrice:32.6499, qty:2000, invested:65299.80, fee:0, availLTV:60, theme:'China Heavy Industry', type:'Stock' },
  { ticker:'3010.HK', yf:'3010.HK', name:'iShares AXJ ETF', exchange:'HKG', ccy:'HKD', avgPrice:60.7377, qty:1600, invested:97180.32, fee:0, availLTV:70, theme:'Asia ex-Japan Equity', type:'ETF' },
  { ticker:'3173.HK', yf:'3173.HK', name:'PP CN New Economy ETF', exchange:'HKG', ccy:'HKD', avgPrice:7.4000, qty:11750, invested:86950.00, fee:0, availLTV:0, theme:'China New Economy', type:'ETF' },

//  PRELOADED HISTORY — Fetched at runtime from data/*.json
//  Format: { "MSFT": { price, prevClose, history: [{d,c,o,h,l},...] }, ... }
//  Populated by bootstrap() below before init() runs. Build pipeline
//  writes data/history.json + data/fx.json + data/meta.json; the client
//  fetches them on page load with a visible loading state.
// ═══════════════════════════════════════════════════════════════
let PRELOADED_HISTORY = {};
let PRELOADED_DATE = '';

// ═══════════════════════════════════════════════════════════════
//  LIVE DATA FETCHER — Cached + Incremental Updates
//  Strategy: cache full 3Y history in localStorage.
//  On refresh, only fetch last 7 days per symbol (fast).
//  Full re-fetch only on first load or manual cache clear.
// ═══════════════════════════════════════════════════════════════
const CACHE_KEY = 'pcc_cache_v5';
const CACHE_MAX_AGE_MS = 12 * 60 * 60 * 1000; // 12 hours before incremental stale

const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
];

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return {};
    return JSON.parse(raw);
  } catch(e) { return {}; }
}

function saveCache(cache) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); }
  catch(e) { /* storage full — clear old entries */ try { localStorage.removeItem(CACHE_KEY); } catch(e2){} }
}

async function fetchWithRetry(url, timeoutMs=10000) {
  for (let pi = 0; pi < PROXIES.length; pi++) {
    try {
      const proxyUrl = PROXIES[pi](url);
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      const resp = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timer);
      if (!resp.ok) continue;
      const text = await resp.text();
      return JSON.parse(text);
    } catch(e) { /* try next proxy */ }
  }
  return null;
}

function parseYahooResponse(json) {
  const result = json?.chart?.result?.[0];
  if (!result) return null;
  const meta = result.meta;
  const quotes = result.indicators?.quote?.[0];
  const timestamps = result.timestamp || [];
  const closes = quotes?.close || [], highs = quotes?.high || [], lows = quotes?.low || [], opens = quotes?.open || [];
  const validCloses = closes.filter(c => c != null && !isNaN(c));
  if (validCloses.length < 2) return null;
  const currentPrice = meta.regularMarketPrice || validCloses[validCloses.length - 1];
  const prevClose = meta.chartPreviousClose || validCloses[validCloses.length - 2];
  const history = [];
  for (let i = 0; i < timestamps.length; i++) {
    if (closes[i] != null && !isNaN(closes[i])) {
      history.push({ d: timestamps[i], c: closes[i], o: opens[i]||closes[i], h: highs[i]||closes[i], l: lows[i]||closes[i] });
    }
  }
  return { price: currentPrice, prevClose, history };
}

function historyToFull(compact) {
  // Convert compact cache format to full format used by rest of app
  return compact.map(h => ({
    date: new Date(h.d * 1000), close: h.c, open: h.o, high: h.h, low: h.l
  }));
}

function mergeHistory(cached, fresh) {
  // Merge fresh bars into cached history, dedup by timestamp
  const map = new Map();
  (cached || []).forEach(h => map.set(h.d, h));
  (fresh || []).forEach(h => map.set(h.d, h)); // fresh overwrites
  const merged = [...map.values()].sort((a,b) => a.d - b.d);
  // Keep last ~2600 bars (10 years of trading days + buffer)
  return merged.slice(-2600);
}

function detectSplit(cached, fresh) {
  // Simple split detection: if the last overlapping bar's close differs by >15%, likely a split
  if (!cached || cached.length < 5 || !fresh || fresh.length < 2) return false;
  const lastCachedTs = cached[cached.length - 1].d;
  // Find overlap
  for (const f of fresh) {
    const match = cached.find(c => c.d === f.d);
    if (match && Math.abs(f.c / match.c - 1) > 0.15) return true;
  }
  return false;
}

async function fetchLivePrice(yfSymbol, range='10y') {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${yfSymbol}?range=${range}&interval=1d`;
    const json = await fetchWithRetry(url);
    if (!json) return null;
    return parseYahooResponse(json);
  } catch(e) { return null; }
}

const DEV_MODE = false;

async function fetchAllPrices() {
  const progEl = document.getElementById('fetchProgress');
  const barEl = document.getElementById('fetchBar');
  const labelEl = document.getElementById('fetchLabel');
  const countEl = document.getElementById('fetchCount');
  const detailEl = document.getElementById('fetchDetail');

  function updateProgress(done, total, sym, mode) {
    const pct = total > 0 ? (done / total * 100) : 0;
    if (barEl) barEl.style.width = pct + '%';
    if (countEl) countEl.textContent = `${done} / ${total}`;
    if (detailEl) detailEl.textContent = sym ? `${mode === 'full' ? '📥 Full history' : mode === 'incremental' ? '🔄 Updating' : '💱 FX rate'}: ${sym}` : 'Preparing...';
  }

  // Show progress bar
  if (progEl) progEl.style.display = 'block';

  // DEV MODE: use cached data only, skip all network requests
  if (DEV_MODE) {
    const cache = loadCache();
    if (Object.keys(cache).length > 5) {
      if (labelEl) labelEl.textContent = 'DEV MODE — using cached data';
      const results = {};
      POSITIONS.forEach(p => {
        if (p.yf && cache[p.yf]) {
          const e = cache[p.yf];
          results[p.yf] = {
            price: e.price, prevClose: e.prevClose,
            dayChange: e.price - (e.prevClose || e.price),
            dayChangePct: e.prevClose ? ((e.price - e.prevClose) / e.prevClose) * 100 : 0,
            history: historyToFull(e.history || [])
          };
        }
      });
      // Also get FX from cache
      ['HKDSGD=X','JPYSGD=X','USDSGD=X'].forEach(sym => {
        if (cache[sym]) {
          const e = cache[sym];
          results[sym] = { price: e.price, prevClose: e.prevClose,
            dayChange: e.price - (e.prevClose || e.price),
            dayChangePct: 0, history: [] };
        }
      });
      // Update FX rates
      if (results['HKDSGD=X']) FX.HKD = results['HKDSGD=X'].price;
      if (results['JPYSGD=X']) FX.JPY = results['JPYSGD=X'].price;
      if (results['USDSGD=X']) FX.USD = results['USDSGD=X'].price;
      if (results['AUDSGD=X']) FX.AUD = results['AUDSGD=X'].price;
      if (results['EURSGD=X']) FX.EUR = results['EURSGD=X'].price;
      return results;
    }
    if (labelEl) labelEl.textContent = 'DEV MODE — no cache found, fetching...';
  }

  const results = {};
  const symbols = [...new Set(POSITIONS.map(p => p.yf).filter(Boolean))];
  const fxSymbols = ['HKDSGD=X','JPYSGD=X','USDSGD=X'];

  // Load cache
  const cache = loadCache();
  const now = Date.now();
  let fullFetchCount = 0, incrementalCount = 0, cacheHitCount = 0;

  // Determine fetch strategy per symbol
  const fetchPlan = symbols.map(sym => {
    const entry = cache[sym];
    if (!entry || !entry.history || entry.history.length < 10) {
      return { sym, mode: 'full' }; // No cache — full 3Y fetch
    }
    const age = now - (entry.ts || 0);
    if (age < CACHE_MAX_AGE_MS) {
      return { sym, mode: 'cached' }; // Fresh enough — use cache
    }
    return { sym, mode: 'incremental' }; // Stale — fetch last 7d and merge
  });

  const fullFetches = fetchPlan.filter(f => f.mode === 'full');
  const incrementals = fetchPlan.filter(f => f.mode === 'incremental');
  const cached = fetchPlan.filter(f => f.mode === 'cached');

  // Status
  const totalFetches = fullFetches.length + incrementals.length + fxSymbols.length;
  if (labelEl) labelEl.textContent = `Fetching live prices — ${cached.length} cached, ${totalFetches} to fetch`;
  if (detailEl) detailEl.textContent = `${incrementals.length} incremental updates · ${fullFetches.length} full history · ${fxSymbols.length} FX rates`;
  updateProgress(0, totalFetches, null, null);

  // Immediately populate from cache
  for (const c of cached) {
    const entry = cache[c.sym];
    results[c.sym] = {
      price: entry.price, prevClose: entry.prevClose,
      dayChange: entry.price - entry.prevClose,
      dayChangePct: ((entry.price - entry.prevClose) / entry.prevClose) * 100,
      history: historyToFull(entry.history)
    };
    cacheHitCount++;
  }

  // Build queue: incrementals first (fast 7d), then full 3Y, then FX
  const queue = [
    ...incrementals.map(f => ({ sym: f.sym, range: '7d', mode: 'incremental' })),
    ...fullFetches.map(f => ({ sym: f.sym, range: '10y', mode: 'full' })),
    ...fxSymbols.map(sym => ({ sym, range: '5d', mode: 'fx' })),
  ];

  let done = 0, failed = 0;
  const concurrency = 5;
  const workQueue = [...queue];

  const workers = [];
  for (let w = 0; w < concurrency; w++) {
    workers.push((async () => {
      while (workQueue.length > 0) {
        const item = workQueue.shift();
        if (!item) break;
        done++;
        updateProgress(done, totalFetches, item.sym, item.mode);

        const data = await fetchLivePrice(item.sym, item.range);
        if (!data) {
          failed++;
          // FALLBACK: if fetch fails but we have stale cache, use it (signals > nothing)
          if (item.mode !== 'fx' && cache[item.sym] && cache[item.sym].history && cache[item.sym].history.length > 10) {
            const entry = cache[item.sym];
            results[item.sym] = {
              price: entry.price, prevClose: entry.prevClose,
              dayChange: entry.price - (entry.prevClose || entry.price),
              dayChangePct: entry.prevClose ? ((entry.price - entry.prevClose) / entry.prevClose) * 100 : 0,
              history: historyToFull(entry.history)
            };
          }
          continue;
        }

        if (item.mode === 'fx') {
          results[item.sym] = data;
        } else if (item.mode === 'incremental') {
          const entry = cache[item.sym];
          // Check for stock split
          if (detectSplit(entry.history, data.history)) {
            // Split detected — need full re-fetch
            workQueue.push({ sym: item.sym, range: '10y', mode: 'full' });
            incrementalCount--;
            continue;
          }
          const merged = mergeHistory(entry.history, data.history);
          cache[item.sym] = { price: data.price, prevClose: data.prevClose, history: merged, ts: now };
          results[item.sym] = {
            price: data.price, prevClose: data.prevClose,
            dayChange: data.price - data.prevClose,
            dayChangePct: ((data.price - data.prevClose) / data.prevClose) * 100,
            history: historyToFull(merged)
          };
          incrementalCount++;
        } else {
          // Full fetch
          cache[item.sym] = { price: data.price, prevClose: data.prevClose, history: data.history, ts: now };
          results[item.sym] = {
            price: data.price, prevClose: data.prevClose,
            dayChange: data.price - data.prevClose,
            dayChangePct: ((data.price - data.prevClose) / data.prevClose) * 100,
            history: historyToFull(data.history)
          };
          fullFetchCount++;
        }
        await new Promise(r => setTimeout(r, 100));
      }
    })());
  }
  await Promise.all(workers);

  // Save updated cache
  saveCache(cache);

  // Update FX
  if (results['HKDSGD=X']) FX.HKD = results['HKDSGD=X'].price;
  if (results['JPYSGD=X']) FX.JPY = results['JPYSGD=X'].price;
  if (results['USDSGD=X']) FX.USD = results['USDSGD=X'].price;
  if (results['AUDSGD=X']) FX.AUD = results['AUDSGD=X'].price;
  if (results['EURSGD=X']) FX.EUR = results['EURSGD=X'].price;

  // Hide progress bar with completion message
  if (progEl) {
    if (labelEl) labelEl.textContent = `✓ Complete — ${cacheHitCount + incrementalCount + fullFetchCount} tickers loaded`;
    if (barEl) barEl.style.width = '100%';
    if (barEl) barEl.style.background = 'var(--g)';
    if (detailEl) {
      const staleCount = failed > 0 ? Object.keys(results).filter(k => !k.includes('=')).length - cacheHitCount - incrementalCount - fullFetchCount : 0;
      detailEl.textContent = `${cacheHitCount} cached · ${incrementalCount} incremental · ${fullFetchCount} full${failed > 0 ? ' · '+failed+' failed' : ''}${staleCount > 0 ? ' ('+staleCount+' stale fallback)' : ''}`;
    }
    // Remove spinner
    const spinner = progEl.querySelector('.loading-spinner');
    if (spinner) spinner.style.display = 'none';
    // Fade out after 2s
    setTimeout(() => { progEl.style.transition = 'opacity 0.5s'; progEl.style.opacity = '0'; setTimeout(() => progEl.style.display = 'none', 500); }, 2000);
  }
  return results;
}

// ═══════════════════════════════════════════════════════════════
//  TREND SIGNAL ENGINE — Monthly Vote (Exit 2/3, Enter 2/3)
//  Factors: Trend(25) + AbsMom(15) + Donchian(15) + >200SMA(12) +
//           Supertrend(10) + Consistency(8) + SMA Cross(11) + ADX(4) = 100
//  ADX measures trend STRENGTH not direction — pure Wilder, pairs with Supertrend.
// ═══════════════════════════════════════════════════════════════
function calcSMA(closes, period) {
  if (closes.length < period) return null;
  const slice = closes.slice(-period);
  return slice.reduce((s,v)=>s+v,0) / period;
}

function calcADX(history, period=14) {
  // Wilder's ADX: measures trend STRENGTH regardless of direction
  // ADX > 25 = trending, > 40 = strong trend, < 20 = no trend
  if (history.length < period * 2 + 1) return null;
  const n = history.length;
  // Step 1: compute +DM, -DM, TR for each bar
  const pdm = [], ndm = [], tr = [];
  for (let i = 1; i < n; i++) {
    const upMove = history[i].high - history[i-1].high;
    const dnMove = history[i-1].low - history[i].low;
    pdm.push(upMove > dnMove && upMove > 0 ? upMove : 0);
    ndm.push(dnMove > upMove && dnMove > 0 ? dnMove : 0);
    tr.push(Math.max(history[i].high - history[i].low, Math.abs(history[i].high - history[i-1].close), Math.abs(history[i].low - history[i-1].close)));
  }
  // Step 2: Wilder smoothing of +DM, -DM, TR
  let sPDM = 0, sNDM = 0, sTR = 0;
  for (let i = 0; i < period; i++) { sPDM += pdm[i]; sNDM += ndm[i]; sTR += tr[i]; }
  const dx = [];
  for (let i = period; i < pdm.length; i++) {
    if (i > period) { sPDM = sPDM - sPDM/period + pdm[i]; sNDM = sNDM - sNDM/period + ndm[i]; sTR = sTR - sTR/period + tr[i]; }
    const pdi = sTR > 0 ? (sPDM / sTR) * 100 : 0;
    const ndi = sTR > 0 ? (sNDM / sTR) * 100 : 0;
    const sumDI = pdi + ndi;
    dx.push(sumDI > 0 ? Math.abs(pdi - ndi) / sumDI * 100 : 0);
  }
  if (dx.length < period) return null;
  // Step 3: Smooth DX into ADX
  let adx = 0;
  for (let i = 0; i < period; i++) adx += dx[i];
  adx /= period;
  for (let i = period; i < dx.length; i++) adx = (adx * (period-1) + dx[i]) / period;
  return adx;
}

function calcATR(history, period=14) {
  // Wilder-smoothed ATR — consistent with Supertrend methodology
  if (history.length < period + 2) return null;
  let atr = 0;
  for (let i = 1; i <= period; i++) {
    const h = history[i].high, l = history[i].low, pc = history[i-1].close;
    atr += Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc));
  }
  atr /= period;
  for (let i = period + 1; i < history.length; i++) {
    const h = history[i].high, l = history[i].low, pc = history[i-1].close;
    const tr = Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc));
    atr = (atr * (period - 1) + tr) / period; // Wilder smoothing
  }
  return atr;
}

function calcSupertrend(history, period=10, mult=3) {
  if (history.length < period + 2) return { trend: 0 };
  // Wilder ATR seed
  let atr = 0;
  for (let i = 1; i <= period; i++) {
    const h=history[i].high, l=history[i].low, pc=history[i-1].close;
    atr += Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc));
  }
  atr /= period;
  // Seed bands from bar `period`
  const seedHL2 = (history[period].high + history[period].low) / 2;
  let upperBand = seedHL2 + mult * atr;
  let lowerBand = seedHL2 - mult * atr;
  let trend = history[period].close > seedHL2 ? 1 : -1;
  for (let i = period + 1; i < history.length; i++) {
    const h=history[i].high, l=history[i].low, c=history[i].close, pc=history[i-1].close;
    const tr = Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc));
    atr = (atr * (period-1) + tr) / period; // Wilder smooth
    const hl2 = (h + l) / 2;
    const newUpper = hl2 + mult * atr;
    const newLower = hl2 - mult * atr;
    upperBand = (newUpper < upperBand || pc > upperBand) ? newUpper : upperBand;
    lowerBand = (newLower > lowerBand || pc < lowerBand) ? newLower : lowerBand;
    if (c > upperBand) trend = 1;
    else if (c < lowerBand) trend = -1;
  }
  return { trend, atr };
}

function calcTrendSignals(history) {
  if (!history || history.length < 15) return { score:0, signal:'—', reasons:['Insufficient data'], details:{}, source:'none' };

  const closes = history.map(h => h.close);
  const n = closes.length;
  const current = closes[n - 1];

  // SMAs — needed for vote signals + chart
  const sma20 = n >= 20 ? calcSMA(closes, 20) : null;
  const sma50 = n >= 50 ? calcSMA(closes, 50) : null;
  const sma200 = n >= 120 ? calcSMA(closes, Math.min(200, n)) : null;

  // ADX (for chart display)
  const adx = calcADX(history);

  // Momentum — for display
  const mom1m = n >= 21 ? (current / closes[n - 21] - 1) * 100 : null;
  const mom3m = n >= 63 ? (current / closes[n - 63] - 1) * 100 : null;
  const mom6m = n >= 126 ? (current / closes[n - 126] - 1) * 100 : null;

  // ATR
  const atr = calcATR(history);
  const atrPct = atr ? (atr / current * 100) : 0;

  // Supertrend (for chart)
  const st = history.length >= 15 ? calcSupertrend(history) : { trend: 0 };

  // Donchian channel high (for chart)
  const dPeriod = Math.min(55, Math.max(20, n));
  const donchianHigh = Math.max(...history.slice(-dPeriod).map(h=>h.high));

  // Blended trend (for chart shading only)
  const fast = n >= 21 ? (current / calcSMA(closes, 21) - 1) : 0;
  const med = n >= 50 ? (current / calcSMA(closes, 50) - 1) : fast;
  const slow = sma200 ? (current / sma200 - 1) : med;
  const blended = fast * 0.2 + med * 0.4 + slow * 0.4;

  // ══════════════════════════════════════════════════════════════════
  // MONTHLY 2/3 VOTE EXIT ENGINE (backtested — "Exit 2/3, Enter 2/3")
  //
  // Three independent signals, evaluated at month-end only:
  //   Vote A: Close > SMA200 (price level vs long-term trend)
  //   Vote B: SMA50 > SMA200 (golden cross — trend structure)
  //   Vote C: 12-month calendar momentum > 0 (absolute return)
  //
  // Exit rule:  votes < 2 → exit (lost majority)
  // Entry rule: votes >= 2 → re-enter (regain majority — symmetric to avoid oscillation)
  //
  // Overbought trim: extension ≥ 8×ATR above trailing stop (one-time)
  // Chandelier stop: HH55-3×ATR, internal only (for ATR extension calc)
  // ══════════════════════════════════════════════════════════════════
  const EX_ATR_PERIOD = 14;
  const EX_M = 55;           // Chandelier HH lookback
  const EX_K = 3.0;          // ATR multiplier
  const EX_EXT_MULT = 8.0;   // overbought extension threshold
  const EX_WARMUP = 252;     // 1 year warmup for 12M momentum

  let atsStop = 0;
  let atsBreached = false;
  let atsFinalDir = 1;       // 1=holding, -1=exited
  let exitType = null;        // 'trend' | null
  let trimSignal = false;
  let exitPoints = [];        // indices where exit triggered
  let reEntryPoints = [];     // indices where re-entry triggered
  let voteA = false, voteB = false, voteC = false; // current votes
  let votes = 0;
  let lastEvalDate = '';      // last month-end evaluated
  let mom12m = null;           // 12M calendar momentum (set inside warmup block or fallback)

  if (n >= EX_WARMUP) {
    // Pre-compute daily ATR array (Wilder smoothing)
    const atrArr = new Float64Array(n);
    let seedSum = 0;
    for (let i = 1; i <= EX_ATR_PERIOD; i++) {
      seedSum += Math.max(history[i].high - history[i].low,
        Math.abs(history[i].high - history[i-1].close),
        Math.abs(history[i].low  - history[i-1].close));
    }
    atrArr[EX_ATR_PERIOD] = seedSum / EX_ATR_PERIOD;
    for (let i = EX_ATR_PERIOD + 1; i < n; i++) {
      const tr = Math.max(history[i].high - history[i].low,
        Math.abs(history[i].high - history[i-1].close),
        Math.abs(history[i].low  - history[i-1].close));
      atrArr[i] = (atrArr[i-1] * (EX_ATR_PERIOD - 1) + tr) / EX_ATR_PERIOD;
    }

    // Pre-compute SMA200 array
    const sma200Arr = new Float64Array(n);
    { let rs = 0; for (let i = 0; i < n; i++) { rs += closes[i]; if (i >= 200) rs -= closes[i-200]; sma200Arr[i] = i >= 199 ? rs / 200 : 0; } }

    // Pre-compute SMA50 array
    const sma50Arr = new Float64Array(n);
    { let rs = 0; for (let i = 0; i < n; i++) { rs += closes[i]; if (i >= 50) rs -= closes[i-50]; sma50Arr[i] = i >= 49 ? rs / 50 : 0; } }

    // Month-end detection helper
    const isMonthEnd = (t) => {
      if (t >= n - 1) return true;
      const d1 = history[t].date, d2 = history[t + 1].date;
      return d1.getMonth() !== d2.getMonth();
    };

    // Calendar 12-month momentum at bar t
    const mom12at = (t) => {
      const targetDate = new Date(history[t].date);
      targetDate.setMonth(targetDate.getMonth() - 12);
      // Find closest bar to targetDate by scanning back
      for (let j = Math.max(0, t - 280); j < t - 220; j++) {
        if (j >= 0 && history[j].date >= targetDate) {
          return (closes[t] / closes[j]) - 1;
        }
      }
      // Fallback: use fixed ~252 bars
      if (t >= 252) return (closes[t] / closes[t - 252]) - 1;
      return null;
    };

    // Walk forward
    let stop = closes[EX_WARMUP - 1] - EX_K * atrArr[EX_WARMUP - 1];
    let inPosition = true; // assume holding at start
    let trimmed = false;

    for (let t = EX_WARMUP; t < n; t++) {
      // Chandelier stop (ratchet up, for ATR extension calc)
      const atr_prev = atrArr[t - 1];
      let hh_prev = 0;
      for (let j = Math.max(0, t - EX_M); j < t; j++) {
        if (history[j].high > hh_prev) hh_prev = history[j].high;
      }
      const cand = hh_prev - EX_K * atr_prev;
      if (inPosition) stop = Math.max(stop, cand);

      // Overbought one-time trim check
      if (inPosition && !trimmed && atr_prev > 0) {
        const extension = (closes[t] - stop) / atr_prev;
        if (extension >= EX_EXT_MULT) {
          trimmed = true;
          if (t === n - 1) trimSignal = true;
        }
      }

      // Monthly vote evaluation
      if (isMonthEnd(t)) {
        const s200 = sma200Arr[t], s50 = sma50Arr[t];
        const m12 = mom12at(t);

        voteA = s200 > 0 && closes[t] > s200;
        voteB = s50 > 0 && s200 > 0 && s50 > s200;
        voteC = m12 != null && m12 > 0;
        votes = (voteA ? 1 : 0) + (voteB ? 1 : 0) + (voteC ? 1 : 0);

        const yr = history[t].date.getFullYear();
        const mo = String(history[t].date.getMonth()+1).padStart(2,'0');
        lastEvalDate = `${yr}-${mo}`;

        // Symmetric: exit on <2, re-enter on >=2 (prevents oscillation at votes=1)
        if (inPosition && votes < 2) {
          inPosition = false;
          exitPoints.push(t);
          if (t === n - 1) exitType = 'trend';
        } else if (!inPosition && votes >= 2) {
          inPosition = true;
          stop = closes[t] - EX_K * atrArr[t];
          trimmed = false;
          reEntryPoints.push(t);
        }
      }
    }

    atsStop = stop;
    atsFinalDir = inPosition ? 1 : -1;
    atsBreached = !inPosition;

    // 12M calendar momentum for display — same method as vote engine (inside scope of mom12at)
    const m12raw = mom12at(n - 1);
    if (m12raw != null) mom12m = m12raw * 100;
  }

  // Reference: 55-day highest high for display
  const hh55 = n >= EX_M ? Math.max(...history.slice(-EX_M).map(h => h.high)) : closes[n-1];

  // Fallback for pre-warmup: use simple 252-bar momentum
  if (mom12m == null && n >= 252) {
    mom12m = (current / closes[n - 252] - 1) * 100;
  }

  // Build reasons from vote signals
  const reasons = [];
  if (n >= EX_WARMUP) {
    reasons.push(voteA ? 'C > SMA200' : 'C < SMA200');
    reasons.push(voteB ? 'Golden Cross' : 'Death Cross');
    reasons.push(voteC ? '12M Mom ▲' : '12M Mom ▼');
    if (trimSignal) reasons.push('Overbought trim');
  } else {
    reasons.push('Warming up');
  }

  // Signal determination — aligned with 2/3 exit engine
  // 3/3 → STRONG BUY (all signals bullish)
  // 2/3 → BUY (majority bullish, position held)
  // 1/3 → SELL (lost majority — exit triggered under 2/3 rule)
  // 0/3 → SELL (all bearish, exit triggered)
  // Pre-warmup (<252 bars): insufficient data for vote engine → HOLD (no opinion)
  const signal = (n >= EX_WARMUP)
    ? (votes >= 3 ? 'STRONG BUY' : votes >= 2 ? 'BUY' : 'SELL')
    : 'HOLD'; // pre-warmup: insufficient history, no vote possible

  return {
    score: votes, signal, reasons,
    details: { sma20, sma50, sma200, adx, mom1m, mom3m, mom6m, mom12m, atr, atrPct, current, blended, supertrend: st.trend, donchianHigh, atsStop, atsBreached, atsFinalDir, hh55, exitType, trimSignal, voteA, voteB, voteC, votes, lastEvalDate, exitPoints, reEntryPoints },
  };
}

// ═══════════════════════════════════════════════════════════════
//  TRADE PLAN CALCULATOR — shared by chart overlay + table
//  Handles: trail breached, min stop floor, sensible R:R
// ═══════════════════════════════════════════════════════════════
function calcTradePlan(px, atr, atsStop, atsBreached, atsFinalDir, hh55, signal) {
  if (!atr || atr <= 0 || signal === 'SELL') return null;

  // ATR stop: ratcheting with direction flip
  // breached = currently in short mode (dir === -1)
  const activeStop = atsStop > 0 ? atsStop : px - 3 * atr;
  const trailBreached = atsBreached;
  const inShortMode = atsFinalDir === -1;

  // Distance metrics (guard against negative when breached)
  const riskAmt = Math.max(px - activeStop, 0);
  const stopPct = riskAmt > 0 ? (riskAmt / px) * 100 : 0;
  const drawdownFromHH = hh55 > 0 ? (1 - px / hh55) * 100 : 0;

  // TP targets from current price
  const tp1 = px + 3 * atr;
  const tp2 = px + 6 * atr;

  // Risk/reward
  const rewardAmt = tp2 - px;
  const rr = riskAmt > 0 ? Math.min(rewardAmt / riskAmt, 10) : 0;

  // ATR extension above stop
  const atrExt = atr > 0 ? riskAmt / atr : 0;

  // Action recommendation
  let action, actionCls;
  if (trailBreached) {
    action = 'ATR stop breached — exit or tighten';
    actionCls = 'color:var(--r)';
  } else if (signal === 'HOLD') {
    action = 'Monitor — hold above stop';
    actionCls = 'color:var(--t3)';
  } else if (signal === 'STRONG BUY') {
    action = 'Hold / add on dip to stop';
    actionCls = 'color:var(--g)';
  } else if (signal === 'BUY') {
    action = 'Hold — trailing stop active';
    actionCls = 'color:var(--g)';
  } else {
    action = 'Monitor';
    actionCls = 'color:var(--t3)';
  }

  return { activeStop, trailBreached, tp1, tp2, riskAmt, rewardAmt, stopPct, rr, atrExt, hwm: hh55, drawdownFromHWM: drawdownFromHH, action, actionCls };
}

};

function enrichAll() {
  state.positions = POSITIONS.map(p => {
    const live = state.liveData[p.yf];
    let mktPrice, dayChange, dayChangePct, history, trendSignals;

    // Get price and history from live data or snapshot
    mktPrice = (live && live.price) ? live.price : (p.mktPriceSnap || SNAPSHOT[p.yf] || SNAPSHOT[p.ticker] || (p.invested ? p.invested / p.qty : 0));
    dayChange = live ? (live.dayChange || 0) : 0;
    dayChangePct = live ? (live.dayChangePct || 0) : 0;
    history = (live && live.history && live.history.length >= 5) ? live.history : null;

    // Compute trend signals
    if (p.type === 'Bond') {
      trendSignals = { score: 0, signal: '—', reasons: ['Bond'], details: {}, source: 'none' };
    } else if (history && history.length >= 15) {
      try {
        trendSignals = calcTrendSignals(history);
        trendSignals.source = 'live';
      } catch(e) {
        console.error('Signal calc error for', p.ticker, e);
        trendSignals = { score: 0, signal: '—', reasons: ['Calc error: ' + (e.message||'').slice(0,40)], details: {}, source: 'error' };
      }
    } else {
      // No usable history — provide "awaiting data" signal
      trendSignals = { score: 0, signal: '—', reasons: ['Awaiting live data'], details: {}, source: 'none' };
    }

    const mktValue = mktPrice * p.qty;
    const fxRate = FX[p.ccy] || 1;
    const mktValueSGD = mktValue * fxRate;
    const hasCost = p.invested != null && p.invested > 0;
    const investedSGD = hasCost ? p.invested * fxRate : mktValueSGD;
    const pnl = hasCost ? mktValue - p.invested : 0;
    const pnlSGD = pnl * fxRate;
    const pnlPct = hasCost && p.invested > 0 ? (pnl / p.invested) * 100 : 0;

    return { ...p, mktPrice, mktValue, mktValueSGD, investedSGD, pnl, pnlSGD, pnlPct, fxRate, dayChange, dayChangePct, history, trendSignals, hasCost };
  });

  state.totalValueSGD = state.positions.reduce((s,p) => s + p.mktValueSGD, 0);
  state.totalInvestedSGD = state.positions.filter(p=>p.hasCost).reduce((s,p) => s + p.investedSGD, 0);
  state.totalPnLSGD = state.positions.filter(p=>p.hasCost).reduce((s,p) => s + p.pnlSGD, 0);
  state.totalPnLPct = state.totalInvestedSGD > 0 ? (state.totalPnLSGD / state.totalInvestedSGD) * 100 : 0;

  state.positions.forEach(p => { p.weight = (p.mktValueSGD / state.totalValueSGD) * 100; });
}

function renderStockChart(containerId, position) {
  const h = position.history;
  if (!h || h.length < 15) {
    document.getElementById(containerId).innerHTML = '<div style="padding:40px;text-align:center;color:var(--t3)">Insufficient price data for chart.</div>';
    return;
  }
  const dates = h.map(d => d.date instanceof Date ? d.date.toISOString().slice(0,10) : d.date);
  const closes = h.map(d=>d.close), highs = h.map(d=>d.high), lows = h.map(d=>d.low);
  const opens = h.map(d=>d.open||d.close);
  const n = closes.length;

  // SMA (O(n) rolling)
  const smaFn = (period) => {
    if (n < period) return new Array(n).fill(null);
    const out = new Array(n).fill(null); let s=0;
    for(let i=0;i<period;i++) s+=closes[i]; out[period-1]=s/period;
    for(let i=period;i<n;i++){s+=closes[i]-closes[i-period];out[i]=s/period;}
    return out;
  };
  const sma50=smaFn(50), sma200=n>=200?smaFn(200):new Array(n).fill(null);

  // 1Y view window
  const ago=new Date();ago.setFullYear(ago.getFullYear()-1);
  const xStart=ago.toISOString().slice(0,10);
  // Add ~15 days padding after last data point so it's not clipped at edge
  const lastDate=new Date(dates[n-1]); lastDate.setDate(lastDate.getDate()+15);
  const xEnd=lastDate.toISOString().slice(0,10);
  const vi=Math.max(0,dates.findIndex(d=>d>=xStart));

  // Y-range from visible data
  const det=position.trendSignals.details||{};
  const va=[];
  for(let i=vi;i<n;i++){va.push(highs[i],lows[i]);if(sma50[i])va.push(sma50[i]);if(sma200[i])va.push(sma200[i]);}
  if(position.hasCost&&position.avgPrice)va.push(position.avgPrice);
  let yMin=Math.min(...va), yMax=Math.max(...va);

  // Trade plan (for ATR extension only)
  const atr=det.atr||0;
  const px=closes[n-1];
  const isSell=position.trendSignals.signal==='SELL';
  const plan=(!isSell&&atr>0)?calcTradePlan(px,atr,det.atsStop,det.atsBreached,det.atsFinalDir,det.hh55,position.trendSignals.signal):null;
  const yPad=(yMax-yMin)*0.05;

  // 200-SMA zone shading
  const shapes=[];
  let zs=null,za=null;
  for(let i=0;i<n;i++){
    const ab=sma200[i]!=null?closes[i]>sma200[i]:null;
    if(ab!==null&&ab!==za){
      if(zs!==null)shapes.push({type:'rect',xref:'x',yref:'paper',x0:dates[zs],x1:dates[i],y0:0,y1:1,fillcolor:za?'rgba(34,197,94,0.04)':'rgba(220,38,38,0.04)',line:{width:0},layer:'below'});
      zs=i;za=ab;
    }
  }
  if(zs!==null)shapes.push({type:'rect',xref:'x',yref:'paper',x0:dates[zs],x1:dates[n-1],y0:0,y1:1,fillcolor:za?'rgba(34,197,94,0.04)':'rgba(220,38,38,0.04)',line:{width:0},layer:'below'});

  // No TP/SL shape lines — exit engine uses SMA composite + trim, not TP targets
  const dp=px<10?3:2;

  const sc=position.trendSignals.score;
  const sig=position.trendSignals.signal;
  const sigColor=sigCol(sig);

  // TRACES — single y-axis, no subplots
  const traces=[];
  // Candlestick
  traces.push({x:dates,open:opens,high:highs,low:lows,close:closes,type:'candlestick',name:'OHLC',
    increasing:{line:{color:'#16a34a',width:1},fillcolor:'#22c55e'},
    decreasing:{line:{color:'#dc2626',width:1},fillcolor:'#ef4444'},
    whiskerwidth:0.4});
  // SMA 50
  traces.push({x:dates,y:sma50,type:'scatter',mode:'lines',name:'50-MA',
    line:{color:'#f59e0b',width:2.5},connectgaps:false,hovertemplate:'50-MA: %{y:.2f}<extra></extra>'});
  // SMA 200 — pink/magenta dashed, the key trend exit reference
  traces.push({x:dates,y:sma200,type:'scatter',mode:'lines',name:'200-MA',
    line:{color:'#e879a0',width:2.5,dash:'dashdot'},connectgaps:false,hovertemplate:'200-MA: %{y:.2f}<extra></extra>'});
  // Historical exit points (monthly vote < 2/3)
  const exitPts = det.exitPoints || [];
  if (exitPts.length > 0) {
    const exX=[], exY=[], exText=[];
    for (const idx of exitPts) {
      if (idx >= vi && idx < n) {
        exX.push(dates[idx]);
        exY.push(highs[idx] + (yMax-yMin)*0.03);
        exText.push('EXIT');
      }
    }
    if (exX.length > 0) {
      traces.push({x:exX,y:exY,type:'scatter',mode:'markers+text',name:'Exit (vote<2/3)',
        marker:{symbol:'triangle-down',size:12,color:'#dc2626',line:{width:1,color:'#991b1b'}},
        text:exText,textposition:'top center',textfont:{size:8,color:'#dc2626',family:'DM Sans'},
        hovertemplate:'Monthly vote < 2/3 — EXIT<extra></extra>'});
    }
  }
  // Re-entry points (monthly vote >= 1/3)
  const reEntryPts = det.reEntryPoints || [];
  if (reEntryPts.length > 0) {
    const reX=[], reY=[];
    for (const idx of reEntryPts) {
      if (idx >= vi && idx < n) {
        reX.push(dates[idx]);
        reY.push(lows[idx] - (yMax-yMin)*0.03);
      }
    }
    if (reX.length > 0) {
      traces.push({x:reX,y:reY,type:'scatter',mode:'markers',name:'Re-entry (vote≥1/3)',
        marker:{symbol:'triangle-up',size:11,color:'#16a34a',line:{width:1,color:'#047857'}},
        hovertemplate:'Monthly vote ≥ 1/3 — RE-ENTER<extra></extra>'});
    }
  }
  // Avg cost
  if(position.hasCost&&position.avgPrice)traces.push({x:[dates[0],dates[n-1]],y:[position.avgPrice,position.avgPrice],type:'scatter',mode:'lines',name:'Cost',line:{color:'#a855f7',width:1.5,dash:'longdash'},hoverinfo:'skip'});

  // Annotations — all labels pushed to right margin, outside chart area
  const annotations=[];
  // Signal badge — anchored just inside right edge
  annotations.push({x:1.0,y:closes[n-1],xref:'paper',yref:'y',text:'<b>'+sig+'</b> '+sc,showarrow:false,font:{size:10,color:'#fff',family:'DM Sans'},bgcolor:sigColor,borderpad:3,xanchor:'left',xshift:4});
  // Cost label — left side of chart
  if(position.hasCost&&position.avgPrice)annotations.push({x:dates[Math.max(0,vi+5)],y:position.avgPrice,text:'Cost '+position.avgPrice.toFixed(dp),showarrow:false,font:{size:9,color:'#a855f7',family:'DM Mono'},yshift:8});
  // Right margin: vote status
  if(isSell){
    annotations.push({x:1.0,y:px,xref:'paper',yref:'y',text:'EXIT',showarrow:false,font:{size:10,color:'#fff',family:'DM Sans'},bgcolor:'#dc2626',borderpad:3,xanchor:'left',xshift:4});
  } else if (det.votes != null && det.votes < 3) {
    const vLabel = det.votes + '/3';
    const vColor = det.votes >= 2 ? '#047857' : '#dc2626';
    annotations.push({x:1.0,y:sma200[n-1]||px,xref:'paper',yref:'y',text:vLabel,showarrow:false,font:{size:9,color:vColor,family:'DM Mono',weight:700},xanchor:'left',xshift:4});
  }

  const layout={
    margin:{t:6,b:32,l:8,r:100},
    paper_bgcolor:'transparent',plot_bgcolor:'#fafaf8',
    font:{family:'DM Sans',size:10,color:'#5c5c56'},
    xaxis:{gridcolor:'#eeeee8',linecolor:'#d5d3ca',linewidth:1,showgrid:false,
      tickformat:"%b '%y",dtick:'M2',tickfont:{size:9},range:[xStart,xEnd],
      hoverformat:"%d %b '%y",
      rangeslider:{visible:false}},
    yaxis:{gridcolor:'#f0f0ea',linecolor:'#d5d3ca',linewidth:1,showgrid:true,gridwidth:1,
      side:'right',tickfont:{size:9,family:'DM Mono'},range:[yMin-yPad,yMax+yPad],fixedrange:false},
    shapes:shapes,annotations:annotations,
    showlegend:true,legend:{x:0,y:1.02,orientation:'h',font:{size:9},bgcolor:'transparent'},
    hovermode:'x unified',hoverlabel:{bgcolor:'#fff',bordercolor:'#d5d3ca',font:{size:10,family:'DM Sans'}},
    dragmode:'zoom',
  };
  Plotly.newPlot(containerId,traces,layout,{displayModeBar:false,responsive:true,scrollZoom:true});
}

// Compute portfolio-level period P&L from position histories
function calcPortfolioPeriodPnL(ps, tradingDaysBack) {
  // For each position with history, find close N trading days ago and compute SGD P&L change
  let totalNow = 0, totalThen = 0, count = 0;
  for (const p of ps) {
    if (!p.history || p.history.length < tradingDaysBack + 1) continue;
    const n = p.history.length;
    const closeNow = p.history[n - 1].close;
    const closeThen = p.history[Math.max(0, n - 1 - tradingDaysBack)].close;
    const valueSGDNow = closeNow * p.qty * (p.fxRate || 1);
    const valueSGDThen = closeThen * p.qty * (p.fxRate || 1);
    totalNow += valueSGDNow;
    totalThen += valueSGDThen;
    count++;
  }
  if (count === 0 || totalThen === 0) return { pnl: 0, pct: 0, count: 0 };
  return { pnl: totalNow - totalThen, pct: ((totalNow - totalThen) / totalThen) * 100, count };
}

function renderKPIs() {
  const ps = state.positions;
  const cdpPs = ps.filter(p=>p.account==='CDP');
  const scPs = ps.filter(p=>p.account!=='CDP');
  const cdpValue = cdpPs.reduce((s,p)=>s+p.mktValueSGD,0);
  const scValue = scPs.reduce((s,p)=>s+p.mktValueSGD,0);
  const votePs = ps.filter(p=>p.trendSignals && p.trendSignals.details && p.trendSignals.details.votes != null && p.type!=='Bond');
  const voteFull = votePs.filter(p=>p.trendSignals.details.votes>=2).length;
  const voteOut = votePs.filter(p=>p.trendSignals.details.votes<2).length;

  // Period P&L: 1D ≈ 1 bar, 1W ≈ 5 bars, 1M ≈ 21 bars
  const d1 = calcPortfolioPeriodPnL(ps, 1);
  const w1 = calcPortfolioPeriodPnL(ps, 5);
  const m1 = calcPortfolioPeriodPnL(ps, 21);

  const pnlKpi = (label, data) => ({
    label, value: fmtPL(data.pnl), sub: fmtPct(data.pct), cls: data.pnl >= 0 ? 'pos' : 'neg'
  });

  const kpis = [
    { label:'Total Market Value', value:fmtSGD(state.totalValueSGD), sub:`Brokerage ${fmtSGD(scValue)} · CDP ${fmtSGD(cdpValue)}` },
    pnlKpi('1-Day P&L', d1),
    pnlKpi('1-Week P&L', w1),
    pnlKpi('1-Month P&L', m1),
    { label:'Monthly Vote', value:`${voteFull}/${votePs.length} OK`, sub:`${voteFull} hold · ${voteOut} exit (<2/3)`, cls:voteOut>0?'neg':'pos' },
    { label:'Positions', value:`${ps.length}`, sub:`${scPs.length} Brokerage · ${cdpPs.length} CDP` },
  ];

// ─── TAB: POSITIONS ──────────────────────
function renderPositions(el) {
  const isBond = p => p.type === 'Bond';
  const allFiltered = state.filter === 'ALL' ? [...state.positions] :
    state.positions.filter(p => regionMap[p.exchange]===state.filter);

  // Split equities/ETFs/REITs from bonds
  const equities = allFiltered.filter(p => !isBond(p));
  const bonds = allFiltered.filter(p => isBond(p));

  // Sort equities
  const sortCol = state.sort.col;
  const sortFn = (a,b) => {
    let va = sortCol === 'trendScore' ? (a.trendSignals.details?.votes||0) : a[sortCol];
    let vb = sortCol === 'trendScore' ? (b.trendSignals.details?.votes||0) : b[sortCol];
    if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase();}
    if(va==null) va = -Infinity; if(vb==null) vb = -Infinity;
    return state.sort.dir==='asc'?(va>vb?1:-1):(va<vb?1:-1);
  };
  equities.sort(sortFn);

  const arrow = col => state.sort.col===col? `<span style="font-size:9px;margin-left:2px">${state.sort.dir==='asc'?'▲':'▼'}</span>` : '';
  const fbtns = ['ALL','Singapore','Asia Pacific','United States','Europe'].map(f=>`<button class="fbtn ${state.filter===f?'active':''}" onclick="setFilter('${f}')">${f}</button>`).join('');

  // ── Vote summary panel ──
  const tradeable = state.positions.filter(p=>!isBond(p) && p.trendSignals && p.trendSignals.details);
  const votePs = tradeable.filter(p => p.trendSignals.details.votes != null);
  const v3 = votePs.filter(p=>p.trendSignals.details.votes>=3).length;
  const v2 = votePs.filter(p=>p.trendSignals.details.votes===2).length;
  const v1 = votePs.filter(p=>p.trendSignals.details.votes===1).length;
  const v0 = votePs.filter(p=>p.trendSignals.details.votes===0).length;

  const signalPanel = `

          <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px">Bullish (≥2/3 votes)</div>
          <div style="font-size:20px;font-weight:700;color:var(--g)">${v3+v2} <span style="font-size:12px;font-weight:400;color:var(--t3)">positions</span></div>
          <div style="font-size:10px;color:var(--t2);margin-top:4px">${v3>0?'<strong>3/3:</strong> '+votePs.filter(p=>p.trendSignals.details.votes>=3).map(p=>p.ticker).join(', '):''} ${v2>0?'<strong>2/3:</strong> '+votePs.filter(p=>p.trendSignals.details.votes===2).map(p=>p.ticker).join(', '):''}</div>
        </div>
      </div>
      <div class="card" style="border-left:3px solid var(--r)">

      </div>
      <table class="tbl">
        <thead><tr>
          <th>Ticker</th><th>Name</th><th class="r">Qty / Face</th><th class="r">Value (SGD)</th><th class="r">Weight</th><th>Account</th>

        <tbody>
          ${bonds.map(p=>`<tr>
            <td><strong>${p.ticker}</strong></td>

            <td class="r" style="font-family:var(--mono);font-size:11px">${fmt(p.qty,0)}</td>

            <td class="r" style="font-size:11px">${fmt(p.weight,1)}%</td>
            <td><span style="font-size:10px;color:var(--t3)">CDP</span></td>
          </tr>`).join('')}
          <tr class="sum">
            <td colspan="3">Total (${bonds.length} bonds)</td>
            <td class="r" style="font-family:var(--mono);font-size:12px">${fmtSGD(totBond)}</td>
            <td class="r" style="font-size:11px">${fmt(totBond/totAll*100,1)}%</td>
            <td></td>
          </tr>
        </tbody>

  el.innerHTML = `
    ${signalPanel}
    <div class="mb">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:0.8px">Equities, ETFs & REITs</div>

  const pnlSorted=[...withCost].sort((a,b)=>b.pnlSGD-a.pnlSGD);

  const byTheme={};
  ps.forEach(p=>{if(!byTheme[p.theme])byTheme[p.theme]=[];byTheme[p.theme].push(p)});

  el.innerHTML = `

        <div class="card-body">

// Toggle chart in action alerts
window.toggleActionChart = function(ticker, event) {
  // Prevent clicking inside the chart from re-toggling
  if (event) {
    const tgt = event.target;
    if (tgt.closest && tgt.closest('.action-chart-wrap')) return;
  }
  const safe = ticker.replace(/\./g,'_');
  const placeholder = document.getElementById('action-chart-'+safe);
  const arrow = document.getElementById('action-arrow-'+safe);
  if (!placeholder) { console.error('No placeholder for', ticker); return; }

  // If chart already rendered, toggle off
  if (placeholder.style.display !== 'none' && placeholder.innerHTML.trim()) {
    placeholder.innerHTML = '';
    placeholder.style.display = 'none';
    if (arrow) arrow.style.transform = '';
    return;
  }

  // Show placeholder FIRST so it has dimensions
  placeholder.style.display = 'block';
  placeholder.style.padding = '4px 16px 16px 16px';
  const plotId = 'action-plot-'+safe;
  placeholder.innerHTML = '<div class="action-chart-wrap" onclick="event.stopPropagation()"><div id="'+plotId+'" style="height:380px;border-radius:8px;overflow:hidden;border:1px solid var(--bd);background:#fafaf8"></div></div>';
  if (arrow) arrow.style.transform = 'rotate(90deg)';

  const pos = state.positions.find(p=>p.ticker===ticker);
  if (!pos || !pos.history) {
    document.getElementById(plotId).innerHTML = '<div style="padding:40px;text-align:center;color:var(--t3)">No price data available for '+ticker+'</div>';
    return;
  }
  // Use setTimeout to ensure DOM is painted before Plotly measures
  setTimeout(() => {
    try {
      renderStockChart(plotId, pos);
    } catch(e) {
      console.error('Chart render error for', ticker, e);
      document.getElementById(plotId).innerHTML = '<div style="padding:40px;text-align:center;color:var(--r)">Chart error: '+e.message+'</div>';
    }
  }, 100);
};

function renderSignals(el) {
  const ps = [...state.positions].sort((a,b)=>(b.trendSignals.details?.votes||0)-(a.trendSignals.details?.votes||0));
  const livePs = ps.filter(p => p.type !== 'Bond' && p.trendSignals.source === 'live' && (p.trendSignals.details||{}).atr > 0);

  // === CLASSIFY POSITIONS INTO ACTION BUCKETS ===
  const actionItems = [];
  livePs.forEach(p => {
    const ts = p.trendSignals, d = ts.details || {}, px = p.mktPrice;
    const atr = d.atr || 0;
    if (!atr) return;
    const dp = px<10?3:2;

    if (ts.signal === 'SELL') {
      const d2 = ts.details || {};
      actionItems.push({p, priority: 0, type: 'EXIT', color: 'var(--r)', bg: 'var(--r-bg2)',
        headline: 'Monthly vote EXIT — 0/3 signals',
        detail: `${d2.voteA?'✓':'✗'} C>SMA200, ${d2.voteB?'✓':'✗'} Golden Cross, ${d2.voteC?'✓':'✗'} 12M Mom`});
      return;
    }

    // EXIT: 1/3 vote positions — already exited under symmetric 2/3 rule
    if (ts.signal === 'SELL' && d.votes === 1) {
      actionItems.push({p, priority: 1, type: 'EXIT', color: 'var(--r)', bg: 'var(--r-bg2)',
        headline: `Monthly vote EXIT — 1/3 signals`,
        detail: `${d.voteA?'✓':'✗'} C>SMA200, ${d.voteB?'✓':'✗'} Golden Cross, ${d.voteC?'✓':'✗'} 12M Mom · Re-entry at next month-end when votes ≥ 2`});
    }

    const plan = calcTradePlan(px, atr, d.atsStop, d.atsBreached, d.atsFinalDir, d.hh55, ts.signal);
    if (!plan) return;

    // ATR extension: how many ATRs above the active stop?
    const atrAboveStop = atr > 0 ? (px - plan.activeStop) / atr : 0;

    // (B) Monthly vote exit: votes < 2/3 at month-end
    if (d.exitType === 'trend') {

    }

    // (C) Overbought trim (one-time ≥8×ATR) or general extension warning (≥4×ATR)
    if (d.trimSignal && !plan.trailBreached) {
