                  <td style="font-size:10px;color:var(--t2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</td>
                  <td class="c"><span class="${sigCls(ts.signal)} signal">${ts.signal}</span></td>
                  <td class="c" style="font-size:13px;font-weight:700;color:${voteCol(v)}">${voteLabel(v)}</td>
                  <td class="c">${d.voteA ? tick : cross} ${d.sma200 ? '<span style="font-size:9px;color:var(--t4)">' + fmt(d.current,dp) + ' vs ' + fmt(d.sma200,dp) + '</span>' : ''}</td>
                  <td class="c">${d.voteB ? tick : cross} ${d.sma50 && d.sma200 ? '<span style="font-size:9px;color:var(--t4)">' + fmt(d.sma50,dp) + ' vs ' + fmt(d.sma200,dp) + '</span>' : ''}</td>
                  <td class="c">${d.voteC ? tick : cross} <span style="font-size:9px;color:${d.mom12m>=0?'var(--g)':'var(--r)'}">${mom12Str}</span></td>
                  <td class="r" style="font-family:var(--mono);font-size:12px;font-weight:600">${fmt(px,dp)}</td>
                  <td class="r" style="font-family:var(--mono);font-size:12px;font-weight:600;color:${extColor}">${plan?fmt(atrExt,1)+'×':'—'}</td>
                  <td style="font-size:9px;color:var(--t4)">${d.lastEvalDate||'—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
        <div style="padding:10px 16px;border-top:1px solid var(--bd);font-size:10px;color:var(--t3);line-height:1.7">
          <strong>Vote A:</strong> Close &gt; SMA200 (price vs trend) ·
          <strong>Vote B:</strong> SMA50 &gt; SMA200 (golden cross = trend structure) ·
          <strong>Vote C:</strong> 12-month calendar momentum &gt; 0 (absolute return) ·
          <strong>Exit:</strong> votes &lt; 2 · <strong>Enter:</strong> votes ≥ 2 ·
          <strong>ATR Ext</strong> = ATRs above HH55−3×ATR (≥8 = trim, ≥4 = extended)
        </div>
      </div>
    </div>
    <div class="mb">
      <div class="card">
        <div class="card-head">
          <div class="card-title"><span class="indicator" style="background:var(--b)"></span>Strategy Backtest — Portfolio Level</div>
          <div style="font-size:10px;color:var(--t3)"><span style="color:#7c3aed;font-weight:600">Combined</span> (vote selection + crisis hedge) · <span style="color:#047857">Crisis Overlay</span> (25% during stress) · <span style="color:#2563eb">Monthly Vote 2/3</span> (per-stock exit/entry) · <span style="color:#6b7280">Buy & Hold</span> · Log scale</div>
        </div>
        <div id="backtestChart" style="height:340px;padding:8px 16px"></div>
        <div id="backtestStats" style="padding:12px 16px;border-top:1px solid var(--bd)"></div>
      </div>
    </div>
    <div class="g2 mb">
      <div class="card"><div class="card-head"><div class="card-title"><span class="indicator" style="background:var(--b)"></span>Exit/Entry Methodology</div></div>
        <div class="card-body" style="font-size:12px">
          <div style="font-size:11px;color:var(--t3);margin-bottom:12px">Monthly "Exit 2/3, Enter 2/3" — symmetric filter, backtested across portfolio. Evaluated last trading day of each month only (~12 decisions/year).</div>
          <table class="tbl">
            <thead><tr><th>Signal</th><th>Type</th><th>Logic</th><th>Independence</th></tr></thead>
            <tbody>
              <tr><td style="font-weight:600">Vote A: C &gt; SMA200</td><td style="color:#2563eb;font-size:10px">LEVEL</td><td style="color:var(--t2)">Price above 200-day moving average</td><td style="color:var(--t3);font-size:10px">Absolute price position</td></tr>
              <tr><td style="font-weight:600">Vote B: SMA50 &gt; SMA200</td><td style="color:#047857;font-size:10px">CROSS</td><td style="color:var(--t2)">Golden cross — structural trend</td><td style="color:var(--t3);font-size:10px">Relative MA alignment</td></tr>
              <tr><td style="font-weight:600">Vote C: 12M Mom &gt; 0</td><td style="color:#7c3aed;font-size:10px">MOMENTUM</td><td style="color:var(--t2)">Calendar 12-month return positive</td><td style="color:var(--t3);font-size:10px">Absolute return</td></tr>
              <tr class="sum"><td colspan="2" style="font-weight:600">Exit: votes &lt; 2 · Enter: votes ≥ 2</td><td colspan="2" style="color:var(--t2)">Conservative exit (need majority) · Symmetric re-entry (regain majority)</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="card"><div class="card-head"><div class="card-title"><span class="indicator" style="background:var(--a)"></span>Signal Summary</div></div>
        <div class="card-body">
          ${['STRONG BUY','BUY','HOLD','SELL'].map(sig=>{
            const arr = ps.filter(p=>p.trendSignals.signal===sig);
            return `<div style="padding:10px 0;border-bottom:1px solid var(--bd)">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <span class="${sigCls(sig)} signal">${sig}</span>
                <span style="font-family:var(--mono);font-size:12px;font-weight:600">${arr.length}</span>
              </div>
              <div style="font-size:10px;color:var(--t3)">${arr.length>0?arr.map(p=>{
                const v = (p.trendSignals.details||{}).votes;
                return p.ticker + (v!=null?' <span style="color:'+voteCol(v)+'">'+voteLabel(v)+'</span>':'');
              }).join(', '):'None'}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;

  setTimeout(() => runBacktest(ps), 100);
}

// ═══════════════════════════════════════════════════════════════
//  BACKTEST: CRISIS RISK OVERLAY (Triple Filter)
//  Buy-and-hold by default. Reduces to 25% during systemic stress.
//  Entry: ALL of >60% <SMA200 + 3M ret<-10% + >50% bearish ST
//  Exit: ANY of <40% <SMA200 or 1M ret>+5% or >50% bullish ST
// ═══════════════════════════════════════════════════════════════
function runBacktest(positions) {
  const chartEl = document.getElementById('backtestChart');
  const statsEl = document.getElementById('backtestStats');
  if (!chartEl || !statsEl) return;

  const TC = 0.0020;
  const eligible = positions.filter(p => p.type !== 'Bond' && p.history && p.history.length >= 80);
  if (eligible.length < 3) {
    statsEl.innerHTML = '<div style="font-size:11px;color:var(--t3);padding:12px">Need ≥3 equity positions with data</div>';
    return;
  }
  const N = eligible.length;
  const stockCloses = eligible.map(p => p.history.map(h => h.close));

  const stockSMA200 = eligible.map((p, j) => {
    const cls = stockCloses[j], L = cls.length;
    const sma = new Float64Array(L);
    let sum = 0;
    for (let i = 0; i < L; i++) {
      sum += cls[i];
      if (i >= 200) sum -= cls[i-200];
      if (i >= 199) sma[i] = sum / 200;
    }
    return sma;
  });

  const stockSTDir = eligible.map((p, j) => {
    const hist = p.history, L = hist.length;
    const dir = new Int8Array(L);
    if (L < 15) return dir;
    const P=10, M=3;
    let atr=0;
    for(let i=1;i<=P;i++) atr+=Math.max(hist[i].high-hist[i].low,Math.abs(hist[i].high-hist[i-1].close),Math.abs(hist[i].low-hist[i-1].close));
    atr/=P;
    let ub=(hist[P].high+hist[P].low)/2+M*atr, lb=(hist[P].high+hist[P].low)/2-M*atr;
    let tr=hist[P].close>(hist[P].high+hist[P].low)/2?1:-1;
    dir[P]=tr;
    for(let i=P+1;i<L;i++){
      const ttr=Math.max(hist[i].high-hist[i].low,Math.abs(hist[i].high-hist[i-1].close),Math.abs(hist[i].low-hist[i-1].close));
      atr=(atr*(P-1)+ttr)/P;
      const hl2=(hist[i].high+hist[i].low)/2;
      const nUb=hl2+M*atr,nLb=hl2-M*atr;
      ub=(nUb<ub||hist[i-1].close>ub)?nUb:ub;
      lb=(nLb>lb||hist[i-1].close<lb)?nLb:lb;
      if(hist[i].close>ub)tr=1;else if(hist[i].close<lb)tr=-1;
      dir[i]=tr;
    }
    return dir;
  });

  // Pre-compute SMA50 for monthly vote strategy
  const stockSMA50 = eligible.map((p, j) => {
    const cls = stockCloses[j], L = cls.length;
    const sma = new Float64Array(L);
    let sum = 0;
    for (let i = 0; i < L; i++) {
      sum += cls[i]; if (i >= 50) sum -= cls[i-50]; if (i >= 49) sma[i] = sum / 50;
    }
    return sma;
  });

  // Per-stock monthly vote state (for the "Exit 2/3, Enter 2/3" strategy)
  // Start ALL stocks as IN — we already hold them. First month-end evaluation
  // will exit any that fail the vote. This matches real portfolio behavior.
  const stockVoteIn = new Array(N).fill(true);
  // Track votes per stock for display
  let stockVoteTrades = 0;

  const allDatesSet = new Set();
  eligible.forEach(p => p.history.forEach(h => {
    allDatesSet.add(h.date instanceof Date ? h.date.toISOString().slice(0,10) : String(h.date));
  }));
  const allDatesSorted = [...allDatesSet].sort();
  const stockByDate = eligible.map(p => {
    const map = new Map();
    p.history.forEach((h,i) => {
      map.set(h.date instanceof Date ? h.date.toISOString().slice(0,10) : String(h.date), i);
    });
    return map;
  });

  const WARMUP = 50;
  const dates=[], bhReturns=[], overlayReturns=[], voteReturns=[], combReturns=[];
  const regimeHistory=[];
  let totalTrades=0, crisisEvents=0;
  let regime='NORMAL';
  const portRetWindow=[];

  // Track live crisis indicators for KPI display
  let lastBreadth=0, lastRet3m=0, lastStBear=0;
  let prevDateStr = '';

  for (const dateStr of allDatesSorted) {
    let bhSum=0, activeN=0;
    const stockData=[];

    // Detect month-end (date month changes vs next date)
    const curMonth = dateStr.slice(0,7); // YYYY-MM
    const prevMonth = prevDateStr.slice(0,7);
    const isNewMonth = prevDateStr && curMonth !== prevMonth; // today is first day of new month = previous was month-end

    for (let j=0;j<N;j++) {
      const idx=stockByDate[j].get(dateStr);
      if(idx==null||idx<WARMUP) continue;
      const hist=eligible[j].history;
      const dailyRet=hist[idx].close/hist[idx-1].close-1;
      activeN++;
      bhSum+=dailyRet;
      stockData.push({j,idx,dailyRet});
    }
    if(activeN<3) { prevDateStr = dateStr; continue; }
    const bhDayRet=bhSum/activeN;

    // Monthly vote strategy: evaluate at month-end (= when we detect a new month)
    let voteTCtoday = 0;
    if (isNewMonth) {
      for (const sd of stockData) {
        const j = sd.j, idx = sd.idx;
        const cls = stockCloses[j];
        // Use previous bar's indicators (end of last month)
        const prevIdx = idx - 1;
        // Only need SMA200 ready (prevIdx >= 199) — don't require 252
        if (prevIdx < 199) continue;
        const s200 = stockSMA200[j][prevIdx];
        const s50 = stockSMA50[j][prevIdx];

        // 12M calendar momentum: use best available lookback
        let mom12 = null;
        if (prevIdx >= 252) {
          mom12 = (cls[prevIdx] / cls[prevIdx - 252]) - 1;
        } else if (prevIdx >= 200) {
          // Use available lookback as proxy (shorter momentum)
          mom12 = (cls[prevIdx] / cls[prevIdx - 200]) - 1;
        }

        // Count votes (2 always available once SMA200 ready, 3rd when momentum ready)
        let v = 0, maxVotes = 2;
        if (s200 > 0 && cls[prevIdx] > s200) v++;
        if (s50 > 0 && s200 > 0 && s50 > s200) v++;
        if (mom12 != null) {
          maxVotes = 3;
          if (mom12 > 0) v++;
        }

        // Symmetric: exit <2, re-enter >=2 (prevents oscillation at votes=1)
        const exitThresh = maxVotes === 3 ? 2 : 2;
        const prevIn = stockVoteIn[j];
        if (stockVoteIn[j] && v < exitThresh) stockVoteIn[j] = false;
        else if (!stockVoteIn[j] && v >= 2) stockVoteIn[j] = true;
        if (prevIn !== stockVoteIn[j]) { stockVoteTrades++; voteTCtoday += TC; }
      }
    }

    // Compute monthly vote portfolio return (equal-weighted, per-stock in/out)
    let voteSum = 0, voteActive = 0;
    for (const sd of stockData) {
      voteActive++;
      if (stockVoteIn[sd.j]) {
        voteSum += sd.dailyRet;
      }
    }
    const voteDayRet = voteActive > 0 ? voteSum / voteActive - voteTCtoday / Math.max(voteActive, 1) : 0;

    portRetWindow.push(bhDayRet);
    if(portRetWindow.length>63) portRetWindow.shift();
    const ret3m=portRetWindow.length>=20?portRetWindow.reduce((c,r)=>c*(1+r),1)-1:0;
    const ret1m=portRetWindow.length>=20?portRetWindow.slice(-20).reduce((c,r)=>c*(1+r),1)-1:0;

    let belowSMA200=0,totalWithSMA=0,bearishST=0,bullishST=0,stTotal=0;
    for(const sd of stockData){
      const sma=stockSMA200[sd.j][sd.idx-1];
      if(sma>0){totalWithSMA++;if(stockCloses[sd.j][sd.idx-1]<sma)belowSMA200++;}
      stTotal++;
      if(stockSTDir[sd.j][sd.idx-1]===-1)bearishST++;
      if(stockSTDir[sd.j][sd.idx-1]===1)bullishST++;
    }
    const breadth=totalWithSMA>0?belowSMA200/totalWithSMA:0;
    const stBear=stTotal>0?bearishST/stTotal:0;
    const stBull=stTotal>0?bullishST/stTotal:0;

    lastBreadth=breadth; lastRet3m=ret3m; lastStBear=stBear;

    const prevRegime=regime;
    if(regime==='NORMAL'){
      if(breadth>0.60&&ret3m<-0.10&&stBear>0.50){regime='CRISIS';crisisEvents++;totalTrades+=2;}
    } else {
      if(breadth<0.40||ret1m>0.05||stBull>0.50) regime='NORMAL';
    }
    let dayRet=bhDayRet;
    if(regime==='CRISIS') dayRet=bhDayRet*0.25+0.00016*0.75;
    if(prevRegime!==regime) dayRet-=TC;

    // Combined: Monthly Vote stock selection + Crisis Overlay macro hedge
    let combDayRet = voteDayRet;
    if(regime==='CRISIS') combDayRet = voteDayRet*0.25+0.00016*0.75;
    if(prevRegime!==regime) combDayRet -= TC;

    dates.push(dateStr);
    bhReturns.push(bhDayRet);
    overlayReturns.push(dayRet);
    voteReturns.push(voteDayRet);
    combReturns.push(combDayRet);
    regimeHistory.push(regime);
    prevDateStr = dateStr;
  }

  if(dates.length<20){statsEl.innerHTML='<div>Insufficient data</div>';return;}

  // Store latest crisis indicators on state for KPI display
  window._crisisIndicators = {
    regime, breadth: lastBreadth, ret3m: lastRet3m, stBear: lastStBear,
    crisisEvents, crisisDays: regimeHistory.filter(r=>r==='CRISIS').length,
    totalDays: dates.length
  };

  let cumB=100, cumO=100, cumV=100, cumC=100;
  const cB=[100], cO=[100], cV=[100], cC=[100];
  for(let i=0;i<dates.length;i++){
    cumB*=(1+bhReturns[i]);cumO*=(1+overlayReturns[i]);cumV*=(1+voteReturns[i]);cumC*=(1+combReturns[i]);
    cB.push(cumB);cO.push(cumO);cV.push(cumV);cC.push(cumC);
  }
  const plotDates=[dates[0],...dates];

  const d0=new Date(dates[0]),d1=new Date(dates[dates.length-1]);
  const years=Math.max((d1-d0)/(365.25*86400000),0.5);
  const totB=cumB-100, totO=cumO-100, totV=cumV-100, totC=cumC-100;
  const annB=(Math.pow(cumB/100,1/years)-1)*100;
  const annO=(Math.pow(cumO/100,1/years)-1)*100;
  const annV=(Math.pow(cumV/100,1/years)-1)*100;
  const annC=(Math.pow(cumC/100,1/years)-1)*100;
  const meanB=bhReturns.reduce((a,b)=>a+b,0)/bhReturns.length;
  const meanO=overlayReturns.reduce((a,b)=>a+b,0)/overlayReturns.length;
  const meanV=voteReturns.reduce((a,b)=>a+b,0)/voteReturns.length;
  const meanC=combReturns.reduce((a,b)=>a+b,0)/combReturns.length;
  const bVol=Math.sqrt(bhReturns.reduce((s,r)=>s+(r-meanB)**2,0)/(bhReturns.length-1))*Math.sqrt(252)*100;
  const oVol=Math.sqrt(overlayReturns.reduce((s,r)=>s+(r-meanO)**2,0)/(overlayReturns.length-1))*Math.sqrt(252)*100;
  const vVol=Math.sqrt(voteReturns.reduce((s,r)=>s+(r-meanV)**2,0)/(voteReturns.length-1))*Math.sqrt(252)*100;
  const cVol=Math.sqrt(combReturns.reduce((s,r)=>s+(r-meanC)**2,0)/(combReturns.length-1))*Math.sqrt(252)*100;
  const maxDD=(cum)=>{let pk=cum[0],dd=0;for(const v of cum){if(v>pk)pk=v;dd=Math.min(dd,(v-pk)/pk*100);}return dd;};
  const bDD=maxDD(cB), oDD=maxDD(cO), vDD=maxDD(cV), cDD=maxDD(cC);
  const sharpeO=oVol>0?(annO-4)/oVol:0;
  const sharpeB=bVol>0?(annB-4)/bVol:0;
  const sharpeV=vVol>0?(annV-4)/vVol:0;
  const sharpeC=cVol>0?(annC-4)/cVol:0;

  const crisisDays=regimeHistory.filter(r=>r==='CRISIS').length;
  const crisisPct=(crisisDays/dates.length*100).toFixed(0);

  const shapes=[];
  let inCr=false,crS='';
  for(let i=0;i<regimeHistory.length;i++){
    if(regimeHistory[i]==='CRISIS'&&!inCr){inCr=true;crS=dates[i];}
    else if(regimeHistory[i]!=='CRISIS'&&inCr){inCr=false;shapes.push({type:'rect',xref:'x',yref:'paper',x0:crS,x1:dates[i],y0:0,y1:1,fillcolor:'rgba(220,38,38,0.08)',line:{width:0}});}
  }
  if(inCr) shapes.push({type:'rect',xref:'x',yref:'paper',x0:crS,x1:dates[dates.length-1],y0:0,y1:1,fillcolor:'rgba(220,38,38,0.08)',line:{width:0}});

  const bI=cB.map(v=>+v.toFixed(1));
  const oI=cO.map(v=>+v.toFixed(1));
  const vI=cV.map(v=>+v.toFixed(1));
  const cI=cC.map(v=>+v.toFixed(1));

  Plotly.newPlot(chartEl,[
    {x:plotDates,y:cI,type:'scatter',mode:'lines',name:'Combined (Vote + Crisis)',
      line:{color:'#7c3aed',width:3},hovertemplate:'Combined: $%{y:,.0f}<extra></extra>'},
    {x:plotDates,y:oI,type:'scatter',mode:'lines',name:'Crisis Overlay Only',
      line:{color:'#047857',width:1.5,dash:'dot'},hovertemplate:'Overlay: $%{y:,.0f}<extra></extra>'},
    {x:plotDates,y:vI,type:'scatter',mode:'lines',name:'Monthly Vote Only',
      line:{color:'#2563eb',width:1.5,dash:'dot'},hovertemplate:'Vote: $%{y:,.0f}<extra></extra>'},
    {x:plotDates,y:bI,type:'scatter',mode:'lines',name:'Buy & Hold',
      line:{color:'#6b7280',width:1.5,dash:'dash'},hovertemplate:'B&H: $%{y:,.0f}<extra></extra>'},
  ],{
    margin:{t:10,b:32,l:55,r:20},
    paper_bgcolor:'transparent',plot_bgcolor:'#fafaf8',
    font:{family:'DM Sans',size:10,color:'#5c5c56'},
    xaxis:{tickfont:{size:9},tickformat:"%b '%y",nticks:12},
    yaxis:{title:'Growth of $100 (log)',titlefont:{size:10},type:'log',gridcolor:'#f0f0ea',tickfont:{size:9,family:'DM Mono'},zerolinecolor:'#d5d3ca',hoverformat:',.0f'},
    legend:{x:0,y:1.1,orientation:'h',font:{size:10}},
    hovermode:'x unified',
    hoverlabel:{font:{family:'DM Mono',size:10}},
    shapes:shapes,
  },{displayModeBar:false,responsive:true});

  statsEl.innerHTML=`
    <div style="display:flex;gap:0;font-size:11px;font-family:var(--mono)">
      <div style="flex:1.2;padding:8px 12px;border-right:1px solid var(--bd);background:rgba(124,58,237,0.04)">
        <div style="font-family:var(--sans);color:#7c3aed;font-size:9px;margin-bottom:3px;font-weight:700">COMBINED (VOTE + CRISIS)</div>
        <div style="font-size:16px;font-weight:700;color:${totC>=0?'#7c3aed':'var(--r)'}">${totC>=0?'+':''}${totC.toFixed(1)}%</div>
        <div style="font-size:9px;color:var(--t4)">${annC.toFixed(1)}% ann · Sharpe ${sharpeC.toFixed(2)} · DD ${cDD.toFixed(1)}%</div>
      </div>
      <div style="flex:1;padding:8px 12px;border-right:1px solid var(--bd)">
        <div style="font-family:var(--sans);color:var(--t4);font-size:9px;margin-bottom:3px">CRISIS ONLY</div>
        <div style="font-size:14px;font-weight:700;color:${totO>=0?'var(--g)':'var(--r)'}">${totO>=0?'+':''}${totO.toFixed(1)}%</div>
        <div style="font-size:9px;color:var(--t4)">${annO.toFixed(1)}% ann · Sharpe ${sharpeO.toFixed(2)} · DD ${oDD.toFixed(1)}%</div>
      </div>
      <div style="flex:1;padding:8px 12px;border-right:1px solid var(--bd)">
        <div style="font-family:var(--sans);color:var(--t4);font-size:9px;margin-bottom:3px">VOTE ONLY</div>
        <div style="font-size:14px;font-weight:700;color:${totV>=0?'#2563eb':'var(--r)'}">${totV>=0?'+':''}${totV.toFixed(1)}%</div>
        <div style="font-size:9px;color:var(--t4)">${annV.toFixed(1)}% ann · Sharpe ${sharpeV.toFixed(2)} · DD ${vDD.toFixed(1)}% · ${stockVoteTrades} trades</div>
      </div>
      <div style="flex:1;padding:8px 12px;border-right:1px solid var(--bd)">
        <div style="font-family:var(--sans);color:var(--t4);font-size:9px;margin-bottom:3px">BUY & HOLD</div>
        <div style="font-size:14px;font-weight:700;color:${totB>=0?'var(--g)':'var(--r)'}">${totB>=0?'+':''}${totB.toFixed(1)}%</div>
        <div style="font-size:9px;color:var(--t4)">${annB.toFixed(1)}% ann · Sharpe ${sharpeB.toFixed(2)} · DD ${bDD.toFixed(1)}%</div>
      </div>
      <div style="flex:0.8;padding:8px 12px;border-right:1px solid var(--bd)">

// Live crisis status KPI (called after backtest computes indicators)
function updateCrisisKPI() {
  const ci = window._crisisIndicators;
  if (!ci) return;
  const el = document.getElementById('crisisKPI');
  if (!el) return;
  const breadthPct = ci.breadth * 100;
  const ret3mPct = ci.ret3m * 100;
  const stBearPct = ci.stBear * 100;

  let metCount = 0;
  if (ci.breadth > 0.60) metCount++;
  if (ci.ret3m < -0.10) metCount++;
  if (ci.stBear > 0.50) metCount++;

  // Count indicators in amber zone (≥75% of threshold but not yet breached)
  let amberCount = 0;
  if (ci.breadth <= 0.60 && ci.breadth > 0.45) amberCount++; // 75% of 60%
  if (ci.ret3m >= -0.10 && ci.ret3m < -0.075) amberCount++; // 75% of -10%
  if (ci.stBear <= 0.50 && ci.stBear > 0.375) amberCount++; // 75% of 50%

  // Status: CRISIS (3/3) > WARNING (2/3) > WATCH (1/3) > ELEVATED (0 met but amber) > ALL CLEAR
  const statusColor = metCount >= 3 ? '#7f1d1d' : metCount === 2 ? '#dc2626' : metCount === 1 ? '#b45309' : amberCount > 0 ? '#92400e' : 'var(--g)';
  const statusLabel = metCount >= 3 ? 'CRISIS' : metCount === 2 ? 'WARNING' : metCount === 1 ? 'WATCH' : amberCount > 0 ? 'ELEVATED' : 'ALL CLEAR';
  const statusBg = metCount >= 3 ? 'var(--r-bg)' : metCount >= 1 ? 'var(--a-bg)' : amberCount > 0 ? 'rgba(251,191,36,0.08)' : 'var(--g-bg)';
  const statusSub = metCount >= 3 ? `${metCount}/3 triggers met — exposure reduced to 25%`
    : metCount > 0 ? `${metCount}/3 triggers met`
    : amberCount > 0 ? `0/3 triggers met · ${amberCount} approaching threshold`
    : '0/3 triggers met';

  // SVG semicircle speed dial
  // value: 0-1 (position on arc), thresh: 0-1 (threshold position), met: bool
  const dial = (label, displayVal, threshLabel, value01, thresh01, met) => {
    const cx = 70, cy = 60, r = 48;
    // Arc from 180° (left) to 0° (right) — semicircle
    const valAngle = Math.PI * (1 - Math.max(0, Math.min(1, value01)));
    const thrAngle = Math.PI * (1 - Math.max(0, Math.min(1, thresh01)));

    // Needle endpoint
    const nx = cx + r * 0.85 * Math.cos(valAngle);
    const ny = cy - r * 0.85 * Math.sin(valAngle);
    // Threshold tick endpoints
    const tx1 = cx + (r - 4) * Math.cos(thrAngle);
    const ty1 = cy - (r - 4) * Math.sin(thrAngle);
    const tx2 = cx + (r + 6) * Math.cos(thrAngle);
    const ty2 = cy - (r + 6) * Math.sin(thrAngle);
    // Threshold label position
    const tlx = cx + (r + 16) * Math.cos(thrAngle);
    const tly = cy - (r + 16) * Math.sin(thrAngle);

    // Arc path helper
    const arcPath = (startFrac, endFrac) => {
      const a1 = Math.PI * (1 - startFrac), a2 = Math.PI * (1 - endFrac);
      const x1 = cx + r * Math.cos(a1), y1 = cy - r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2), y2 = cy - r * Math.sin(a2);
      return `M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`;
    };

    const valColor = met ? '#dc2626' : value01 > thresh01 * 0.75 ? '#b45309' : '#047857';

    return `<div style="text-align:center;flex:1">
      <svg viewBox="0 0 140 78" style="width:100%;max-width:160px">
        <!-- Background arc -->
        <path d="${arcPath(0, 1)}" fill="none" stroke="#e8e6df" stroke-width="10" stroke-linecap="round"/>
        <!-- Green zone: 0 to threshold -->
        <path d="${arcPath(0, Math.min(thresh01 * 0.75, thresh01))}" fill="none" stroke="#bbf7d0" stroke-width="10" stroke-linecap="round"/>
        <!-- Amber zone: near threshold -->
        <path d="${arcPath(thresh01 * 0.75, thresh01)}" fill="none" stroke="#fde68a" stroke-width="10" stroke-linecap="round"/>
        <!-- Red zone: beyond threshold -->
        <path d="${arcPath(thresh01, 1)}" fill="none" stroke="#fecaca" stroke-width="10" stroke-linecap="round"/>
        <!-- Threshold tick -->
        <line x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <text x="${tlx}" y="${tly}" text-anchor="middle" font-size="7" fill="#dc2626" font-family="var(--mono)" font-weight="600">${threshLabel}</text>
        <!-- Needle -->
        <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${valColor}" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="${cx}" cy="${cy}" r="4" fill="${valColor}"/>
        <!-- Value text -->
        <text x="${cx}" y="${cy + 16}" text-anchor="middle" font-size="12" font-weight="700" fill="${valColor}" font-family="var(--mono)">${displayVal}</text>
      </svg>
      <div style="font-size:10px;color:var(--t2);margin-top:-2px">
        <span style="color:${met?'var(--r)':'var(--g)'};font-weight:700">${met?'✗':'✓'}</span> ${label}
      </div>
    </div>`;
  };

  // Map each metric to 0-1 scale
  // Breadth: 0-100% where 60% = threshold → thresh01 = 0.60
  const breadthVal = breadthPct / 100;
  // 3M Return: +20% (safe) to -15% (worst) → map to 0-1 where -10% = threshold
  const ret3mVal = Math.max(0, Math.min(1, (20 - ret3mPct) / 35)); // 0 = +20%, 1 = -15%
  const ret3mThresh = (20 + 10) / 35; // -10% maps to ~0.857
  // Supertrend: 0-100% where 50% = threshold → thresh01 = 0.50
  const stBearVal = stBearPct / 100;

  el.innerHTML = `
    <div class="card" style="border-left:3px solid ${statusColor}">
      <div class="card-body" style="padding:12px 20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <div>
            <div style="font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:0.8px">Crisis Overlay Status</div>
            <div style="font-size:18px;font-weight:700;color:${statusColor}">${statusLabel} <span style="font-size:11px;font-weight:500;color:var(--t3)">${statusSub}</span></div>
          </div>
          <span style="padding:4px 12px;border-radius:12px;font-size:10px;font-weight:600;background:${statusBg};color:${statusColor}">${ci.regime}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end;border-top:1px solid var(--bd);padding-top:8px">
          ${dial('Breadth < SMA200', breadthPct.toFixed(0)+'%', '60%', breadthVal, 0.60, ci.breadth > 0.60)}
          ${dial('3M Return', (ret3mPct >= 0 ? '+' : '') + ret3mPct.toFixed(1)+'%', '−10%', ret3mVal, ret3mThresh, ci.ret3m < -0.10)}
          ${dial('Bear Supertrend', stBearPct.toFixed(0)+'%', '50%', stBearVal, 0.50, ci.stBear > 0.50)}
        </div>
        <div style="font-size:9px;color:var(--t4);margin-top:4px;border-top:1px solid var(--bd);padding-top:6px">
          Crisis triggers when ALL 3 conditions met simultaneously · Recovery: ANY of &lt;40% breadth, 1M &gt;+5%, or &gt;50% bullish ST ·
          <span style="color:var(--r)">${ci.crisisEvents} events</span> · ${ci.crisisDays}d in crisis (${(ci.crisisDays/ci.totalDays*100).toFixed(0)}%)
        </div>
      </div>
    </div>
  `;
}

function renderRisk(el) {

  el.innerHTML = `

      ].map(card=>`

          </div>

            ${card.items.map(m=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);font-size:11px">

            </div>`).join('')}
          </div>

    </div>
    <div class="g2 mb">
      <div class="card">
        <div class="card-head"><div class="card-title"><span class="indicator" style="background:var(--c)"></span>Available Margin Facility</div></div>

// Track data version — increments when live data arrives
let _dataVersion = 0;
const _paneVersion = {}; // tracks which version each pane was rendered at

function renderTab(forceAll) {
  const tabs = ['positions','signals','allocation','performance','risk'];
  // Show/hide panes
  tabs.forEach(t => {
    document.getElementById('pane-'+t).style.display = t === state.tab ? '' : 'none';
  });
  // Only render if data changed since last render of this pane, or forceAll
  const pane = document.getElementById('pane-'+state.tab);
  if (forceAll || _paneVersion[state.tab] !== _dataVersion) {
    switch(state.tab) {
      case 'positions': renderPositions(pane); break;
      case 'allocation': renderAllocation(pane); break;
      case 'performance': renderPerformance(pane); break;
      case 'signals': renderSignals(pane); break;
      case 'risk': renderRisk(pane); break;
    }
    _paneVersion[state.tab] = _dataVersion;
  }
}

function invalidateAllPanes() {
  _dataVersion++;
  // Force re-render of current visible tab
  _paneVersion[state.tab] = -1;
  renderTab();
}

document.getElementById('tabBar').addEventListener('click', e => {
  if (e.target.classList.contains('tab')) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    e.target.classList.add('active');
    state.tab = e.target.dataset.tab;
    renderTab();
  }
});

window.setFilter = f => { state.filter = f; _paneVersion[state.tab] = -1; renderTab(); };
window.setSort = col => {
  if (state.sort.col===col) state.sort.dir = state.sort.dir==='asc'?'desc':'asc';
  else { state.sort.col=col; state.sort.dir='desc'; }
  _paneVersion[state.tab] = -1; renderTab();
};

function loadPreloadedData() {
  // Convert PRELOADED_HISTORY into the liveData format used by enrichAll()
  const results = {};
  const preloadKeys = Object.keys(PRELOADED_HISTORY);
  if (preloadKeys.length === 0) return null;

  for (const sym of preloadKeys) {
    const entry = PRELOADED_HISTORY[sym];
    if (!entry) continue;
    // FX entries (symbol contains '=')
    if (sym.includes('=')) {
      results[sym] = { price: entry.price, prevClose: entry.prevClose, dayChange: 0, dayChangePct: 0, history: [] };
      continue;
    }
    results[sym] = {
      price: entry.price,
      prevClose: entry.prevClose,
      dayChange: entry.price - (entry.prevClose || entry.price),
      dayChangePct: entry.prevClose ? ((entry.price - entry.prevClose) / entry.prevClose) * 100 : 0,
      history: historyToFull(entry.history || [])
    };
  }
  // Update FX from preloaded
  if (results['HKDSGD=X']) FX.HKD = results['HKDSGD=X'].price;
  if (results['JPYSGD=X']) FX.JPY = results['JPYSGD=X'].price;
  if (results['USDSGD=X']) FX.USD = results['USDSGD=X'].price;
  if (results['AUDSGD=X']) FX.AUD = results['AUDSGD=X'].price;
  if (results['EURSGD=X']) FX.EUR = results['EURSGD=X'].price;
  return results;
}

// Manual refresh — triggered by user clicking "Refresh" button
window.refreshPrices = async function() {
  const pill = document.getElementById('statusPill');
  pill.className = 'pill pill-loading';
  pill.textContent = '◌ REFRESHING';

  // Restore the progress bar UI (init() may have overwritten it with the prompt banner)
  const prog = document.getElementById('fetchProgress');
  if (prog) {
    prog.innerHTML = `<div style="padding:12px 18px;display:flex;align-items:center;gap:14px">
      <div class="loading-spinner" style="width:18px;height:18px;border-width:2px;margin:0;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;font-weight:600;color:var(--t1)" id="fetchLabel">Refreshing live prices...</span>
          <span style="font-size:11px;font-weight:600;color:var(--b);font-family:var(--mono)" id="fetchCount">0 / 0</span>
        </div>
        <div style="height:6px;border-radius:3px;background:var(--bg4);overflow:hidden">
          <div id="fetchBar" style="height:100%;border-radius:3px;background:var(--b);transition:width 0.3s ease;width:0%"></div>
        </div>
        <div style="font-size:10px;color:var(--t3);margin-top:4px" id="fetchDetail">Preparing fetch queue...</div>
      </div>
    </div>`;
    prog.style.display = 'block';
  }

  try {
    const liveData = await fetchAllPrices();
    const liveCount = Object.keys(liveData).filter(k => !k.includes('=')).length;
    if (liveCount > 0) {
      state.liveData = liveData;
      state.dataSource = 'live';
      enrichAll();
      renderKPIs();
      invalidateAllPanes();
      const sigCount = state.positions.filter(p => p.trendSignals && p.trendSignals.source === 'live').length;
      pill.className = 'pill pill-live';
      pill.textContent = `● ${sigCount} LIVE`;
    } else {
      pill.className = 'pill pill-date';
      pill.textContent = '◌ NO DATA';
    }
    // Hide progress bar on completion
    if (prog) prog.style.display = 'none';
  } catch(e) {
    pill.className = 'pill pill-date';
    pill.textContent = '◌ REFRESH FAILED';
    if (prog) prog.style.display = 'none';
  }
};

async function init() {
  renderDate();

  const hasPreload = Object.keys(PRELOADED_HISTORY).length > 0;

  if (hasPreload) {
    // ── INSTANT PATH: Embedded data available ──
    const preloaded = loadPreloadedData();
    state.liveData = preloaded;
    state.dataSource = 'preloaded';
    enrichAll();
    renderKPIs();
    _dataVersion++;
    renderTab();
    document.getElementById('loadingOverlay').style.display = 'none';

    const sigCount = state.positions.filter(p => p.trendSignals && p.trendSignals.source === 'live').length;
    const pill = document.getElementById('statusPill');
    pill.className = 'pill pill-live';
    pill.textContent = PRELOADED_DATE ? `📊 ${PRELOADED_DATE}` : `📊 ${sigCount} PRELOADED`;

    const prog = document.getElementById('fetchProgress');

  //    on localhost only, auto-fetch live from Yahoo Finance.
  //    Phase 2: data/*.json is the sole source of truth in production;
  //    failure to load it means we serve SNAPSHOT and stop rather than
  //    hammer public CORS proxies. The live-fetch fallback below is
  //    retained as a local-dev convenience only.
  enrichAll();
  renderKPIs();
  _dataVersion++;
  renderTab();
  document.getElementById('loadingOverlay').style.display = 'none';

  if (!isLocalhost()) {
    document.getElementById('statusPill').className = 'pill pill-date';
    document.getElementById('statusPill').textContent = '◌ SNAPSHOT';
    return;
  }

  // Then auto-fetch in background with progress bar (localhost dev only).
  try {
    document.getElementById('statusPill').className = 'pill pill-loading';
    document.getElementById('statusPill').textContent = '◌ FETCHING';

    const liveData = await fetchAllPrices();
    const liveCount = Object.keys(liveData).filter(k => !k.includes('=')).length;
    const withHistory = Object.values(liveData).filter(d => d.history && d.history.length >= 15).length;

    if (liveCount > 0) {
      state.liveData = liveData;
      state.dataSource = liveCount >= 15 ? 'live' : 'partial';
      enrichAll();
      renderKPIs();
      invalidateAllPanes();

      const sigCount = state.positions.filter(p => p.trendSignals && p.trendSignals.source === 'live').length;
      const pill = document.getElementById('statusPill');
      if (sigCount >= 10) {
        pill.className = 'pill pill-live';
        pill.textContent = `● ${sigCount} SIGNALS`;
      } else if (withHistory > 0) {
        pill.className = 'pill pill-live';
        pill.style.background = '#92400e';
        pill.textContent = `◐ ${withHistory} CACHED`;
      } else {
        pill.className = 'pill pill-date';
        pill.textContent = '◌ SNAPSHOT';
      }
    } else {
      document.getElementById('statusPill').className = 'pill pill-date';
      document.getElementById('statusPill').textContent = '◌ SNAPSHOT';
    }
  } catch(e) {
    document.getElementById('statusPill').className = 'pill pill-date';
    document.getElementById('statusPill').textContent = '◌ SNAPSHOT';
  }
}

// ═══════════════════════════════════════════════════════════════
//  DATA BOOTSTRAP — Fetch baked data from data/*.json at startup
//  Phase 2: the build pipeline writes data/history.json (stock OHLC),
//  data/fx.json (FX rates) and data/meta.json (build date, ticker list)
//  into the repo; the client fetches them here before init() runs.
//  On localhost, if the three files are missing, init()'s live-fetch
//  path takes over as a dev convenience. In production, missing data
//  falls through to a SNAPSHOT render rather than any upstream call.
// ═══════════════════════════════════════════════════════════════
function isLocalhost() {
  const h = location.hostname;
  return h === 'localhost' || h === '127.0.0.1' || h === '';
}

async function fetchDataFile(name) {
  const resp = await fetch('data/' + name, { cache: 'default' });
  if (!resp.ok) throw new Error(name + ' ' + resp.status);
  return resp.json();
}

async function bootstrap() {
  const pill = document.getElementById('statusPill');
  if (pill) {
    pill.className = 'pill pill-loading';
    pill.textContent = '◌ LOADING DATA';
  }

  try {
    const [hist, fx, meta] = await Promise.all([
      fetchDataFile('history.json'),
      fetchDataFile('fx.json'),
      fetchDataFile('meta.json'),
    ]);
    PRELOADED_HISTORY = Object.assign({}, hist, fx);
    PRELOADED_DATE = (meta && meta.date) ? meta.date : '';
  } catch (e) {
    console.warn('[bootstrap] data/*.json load failed:', e.message);
    // Leave PRELOADED_HISTORY empty; init() will take the FETCH PATH,
    // which is gated to localhost-only per the Phase 2 design.
  }

  await init();
}

bootstrap();
</script>
